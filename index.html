<script>
/* ============================================================ STATE */
const NS = 'look-ahead-schedule';
const state = {
  nav: 'schedule',
  companies: {}, holidays: {}, templates: {}, meta: {}, projects: {}, pours: {},
  resolved: {}, online: false, collapsed: {}, lastTask: null,
  view: 'build', laWeeks: 3, laOffset: 0, gz: 1, gFilter: 'all', gColor: 'company', gFull: false, gFit: false, showTimeline: true, gPan: false, gSearch: '', laSearch: '', crewHide: {}, dirty: false, pending: 0,
  ganttNameW: (parseInt(localStorage.getItem('la_gnameW'))||156),
  tools: { assets:{}, config:{}, loaded:false, loading:false, q:'', status:'all', tab:'dash', groupBy:'category' },
  att: { dates:[], date:'', records:{}, foremen:{}, members:{}, areas:{}, loaded:false, loading:false },
  infoflow: { ann:{}, docs:{}, facts:{}, config:{}, loaded:false, loading:false, subject:null, unlocked:(localStorage.getItem('la_if_unlocked')==='1') },
};

/* ============================================================ HELPERS */
const $ = (s,el=document)=>el.querySelector(s);
const pad = n => String(n).padStart(2,'0');
const uid = p => p + Math.random().toString(36).slice(2,8);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, kind='ok'){
  const el=document.createElement('div'); el.className='toast';
  el.style.background = kind==='err' ? '#7f1d1d' : kind==='warn' ? '#92610a' : '#1f6b2a';
  el.style.color='#fff'; el.textContent=msg; $('#toast').appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}
function hexToRgb(h){ const c=h.replace('#',''); return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]; }
function textOn(hex){ const [r,g,b]=hexToRgb(hex); return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? '#111111' : '#ffffff'; }

/* ============================================================ DATE ENGINE */
function parseYMD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d, 12); }
function fmtYMD(dt){ return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`; }
function addDays(s,n){ const d=parseYMD(s); d.setDate(d.getDate()+n); return fmtYMD(d); }
function dow(s){ return parseYMD(s).getDay(); } // 0=Sun .. 6=Sat
function isWeekend(s){ const d=dow(s); return d===0||d===6; }
function isHoliday(s,hol){ return !!(hol&&hol[s]); }
function isWorkday(s,hol){ return !isWeekend(s) && !isHoliday(s,hol); }
function workday(start,n,hol){
  let s=start; const step=n>=0?1:-1; let left=Math.abs(n);
  while(!isWorkday(s,hol)) s=addDays(s, step||1);
  while(left>0){ s=addDays(s,step); if(isWorkday(s,hol)) left--; }
  return s;
}
function taskFinish(start,days,hol){ return workday(start, Math.max(1, Number(days)||1)-1, hol); }
function workingDaysBetween(start,finish,hol){
  const out=[]; let s=start; let guard=0;
  while(parseYMD(s)<=parseYMD(finish) && guard++<3650){ if(isWorkday(s,hol)) out.push(s); s=addDays(s,1); }
  return out;
}
function fmtMD(ymd){ if(!ymd) return ''; const [y,m,d]=ymd.split('-'); return `${Number(m)}/${Number(d)}`; }

function computeProject(project, hol){
  const tasks = Object.entries(project.tasks||{}).map(([id,t])=>({id,...t}));
  const byId={}; tasks.forEach(t=>byId[t.id]=t);
  const bySection={}; tasks.forEach(t=>{ (bySection[t.sectionId]=bySection[t.sectionId]||[]).push(t); });
  Object.values(bySection).forEach(a=>a.sort((x,y)=>(x.order||0)-(y.order||0)));
  const prevInSection=t=>{ const a=bySection[t.sectionId]||[]; const i=a.findIndex(x=>x.id===t.id); return i>0?a[i-1]:null; };
  const memo={}, stack=new Set();
  function resolve(t){
    if(memo[t.id]) return memo[t.id];
    const anchor = t.start || project.startDate;
    if(stack.has(t.id)){ const s=workday(anchor,0,hol); return {start:s, finish:taskFinish(s,t.days,hol)}; }
    stack.add(t.id);
    let pred=null;
    if(t.depId && byId[t.depId]) pred=byId[t.depId];
    else if(t.depMode==='afterPrev') pred=prevInSection(t);
    let start;
    if(pred){ const pr=resolve(pred); start=workday(pr.finish, 1 + (Number(t.lag)||0), hol); }
    else { start=workday(anchor,0,hol); }
    const finish=taskFinish(start, t.days, hol);
    stack.delete(t.id);
    return memo[t.id]={start, finish};
  }
  tasks.forEach(resolve);
  return memo;
}

/* ============================================================ DEFAULT DATA */

function defaultProject(){
  // anchor to next Monday from today
  let s=fmtYMD(new Date()); while(dow(s)!==1) s=addDays(s,1);
  const pid='laccfdn';
  const proj={ id:pid, name:'LA Convention Center', subtitle:'Look Ahead Schedule', startDate:s, sections:{}, tasks:{} };
  addCycleTo(proj, 'pileCapCycle', 'Grid line R Pile caps 8-10', s, null);
  return proj;
}
function addCycleTo(proj, tplId, sectionName, firstStart, chainToTaskId){
  const tpl = (state.templates[tplId]||DEFAULT_TEMPLATES[tplId]);
  if(!tpl) return;
  const sid=uid('s_');
  const order = Object.keys(proj.sections).length;
  proj.sections[sid] = { name:sectionName, order };
  let prevId = chainToTaskId || null;
  tpl.tasks.forEach((step,i)=>{
    const tid=uid('t_');
    const t = { sectionId:sid, order:i, name:step.name, companyId:step.companyId, days:step.days, lag:0, depId:null, linkedPourId:null };
    if(i===0){
      if(chainToTaskId){ t.depMode='afterPrev'; t.depId=chainToTaskId; }
      else { t.depMode='manual'; t.start=firstStart; }
    } else { t.depMode='afterPrev'; }
    proj.tasks[tid]=t; prevId=tid;
  });
  return sid;
}

/* ============================================================ ACTIVE PROJECT */
function activeId(){ return state.meta.activeProjectId || Object.keys(state.projects)[0]; }
function activeProject(){ return state.projects[activeId()]; }
function ensureActive(){
  if(!Object.keys(state.projects).length){ const p=defaultProject(); state.projects[p.id]=p; state.meta.activeProjectId=p.id; }
  if(!state.projects[state.meta.activeProjectId]) state.meta.activeProjectId=Object.keys(state.projects)[0];
}
function companyList(){ return Object.entries(state.companies).map(([id,c])=>({id,...c})).sort((a,b)=>(a.order||0)-(b.order||0)); }
function sectionList(p){ return Object.entries(p.sections||{}).map(([id,s])=>({id,...s})).sort((a,b)=>(a.order||0)-(b.order||0)); }
function tasksOf(p, sid){ return Object.entries(p.tasks||{}).filter(([,t])=>t.sectionId===sid).map(([id,t])=>({id,...t})).sort((a,b)=>(a.order||0)-(b.order||0)); }

function recomputeActive(){
  const p=activeProject(); if(!p){ state.resolved={}; return; }
  const res=computeProject(p, state.holidays); state.resolved=res;
  Object.entries(res).forEach(([tid,r])=>{ if(p.tasks[tid]){ p.tasks[tid].cStart=r.start; p.tasks[tid].cFinish=r.finish; } });
}

/* ============================================================ FIREBASE */
const FIREBASE_CONFIG = { databaseURL: localStorage.getItem('la_firebase_url') || 'https://gen-lang-client-0119642855-default-rtdb.firebaseio.com' };
const DBURL = FIREBASE_CONFIG.databaseURL;
let db=null;
function initFirebase(){ try{ if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); return true; }catch(e){ console.error('fb init',e); return false; } }
const fb = {
  set:(p,d)=> db? db.ref(NS+'/'+p).set(d) : Promise.resolve(),
  update:(p,d)=> db? db.ref(NS+'/'+p).update(d) : Promise.resolve(),
  get:(p)=> db? db.ref(NS+'/'+p).once('value').then(s=>s.val()) : Promise.resolve(null),
  remove:(p)=> db? db.ref(NS+'/'+p).remove() : Promise.resolve(),
  listen:(p,cb)=>{ if(db) db.ref(NS+'/'+p).on('value', s=>cb(s.val())); },
};
function saveLocal(){ try{ localStorage.setItem('la_snapshot', JSON.stringify({companies:state.companies,holidays:state.holidays,templates:state.templates,meta:state.meta,projects:state.projects})); }catch(e){} }
function loadLocal(){
  try{ const s=JSON.parse(localStorage.getItem('la_snapshot')||'null');
    if(s){ state.companies=s.companies||{}; state.holidays=s.holidays||{}; state.templates=s.templates||{}; state.meta=s.meta||{}; state.projects=s.projects||{}; }
  }catch(e){}
  if(!Object.keys(state.companies).length) state.companies={...DEFAULT_COMPANIES};
  if(!Object.keys(state.templates).length) state.templates=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  if(!Object.keys(state.holidays).length) state.holidays={...DEFAULT_HOLIDAYS};
  try{ state.collapsed=JSON.parse(localStorage.getItem('la_collapsed')||'{}'); }catch(e){}
}
/* Edits save instantly to this device (localStorage) and mark the schedule "unsaved".
   The cloud (Firebase) write happens on manual Save / ⌘S, and auto every 5 min once >5 changes pile up. */
function saveActive(){
  saveLocal();
  state.dirty=true; state.pending=(state.pending||0)+1;
  try{ localStorage.setItem('la_dirty','1'); }catch(e){}   // so a reload knows local is ahead of cloud
  refreshSaveUI();
}
function saveNow(opts){
  opts=opts||{};
  saveLocal();
  if(!db || !state.online){ if(opts.manual) toast('Saved on this device — will sync when online','ok'); refreshSaveUI(); return; }
  if(!state.dirty && !opts.force){ if(opts.manual) toast('All changes saved','ok'); refreshSaveUI(); return; }
  setSaveStatus('saving');
  const pid=activeId(); const w=(pid&&state.projects[pid])? fb.set('projects/'+pid, state.projects[pid]) : Promise.resolve();
  Promise.resolve(w).then(()=>fb.set('meta', state.meta)).then(()=>{
    state.dirty=false; state.pending=0; try{ localStorage.removeItem('la_dirty'); }catch(e){}
    setSaveStatus('saved'); if(opts.manual) toast('Saved to cloud','ok'); else if(opts.auto) toast('Auto-saved','ok');
  }).catch(()=>{ setSaveStatus('saved'); if(opts.manual) toast('Save failed — kept on device','warn'); });
}
/* ----- save status / button (top-right) ----- */
function refreshSaveUI(){ const el=document.getElementById('saveStatus'); if(el) el.outerHTML=saveStatusEl(); }
function setSaveStatus(s){ state.saveState={ status:s, at: s==='saved'?Date.now():(state.saveState&&state.saveState.at||0) }; refreshSaveUI(); }
function saveStatusEl(){
  // The Save chip only tracks Schedule/Settings edits (which buffer locally until Save/⌘S).
  // Info Flow / Attendance / Tools write straight to the cloud, so show a truthful "Live" pill there.
  if(state.nav!=='schedule' && state.nav!=='settings'){
    return `<span id="saveStatus" class="btn btn-ghost btn-sm text-sky-300 whitespace-nowrap" title="Changes on this tab save to the cloud instantly"><span class="ms text-[16px]">cloud_done</span> Live · auto-syncs</span>`;
  }
  const s=state.saveState||{status:'saved',at:0}; let icon,txt,btncls,cls='';
  if(s.status==='saving'){ icon='sync'; txt='Saving…'; btncls='btn-ghost'; cls='text-amber-300'; }
  else if(!state.online){ icon='cloud_off'; txt='On device'; btncls='btn-ghost'; cls='text-amber-300'; }
  else if(state.dirty){ const n=state.pending||0; icon='save'; txt='Save'+(n>1?` · ${n}`:''); btncls='btn-green'; }
  else { const t=s.at? new Date(s.at).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):''; icon='cloud_done'; txt='Saved'+(t?' '+t:''); btncls='btn-ghost'; cls='text-sky-300'; }
  return `<button id="saveStatus" class="btn ${btncls} btn-sm ${cls} whitespace-nowrap" title="Save to cloud (⌘S / Ctrl+S)" onclick="saveNow({manual:true})"><span class="ms text-[16px]">${icon}</span> ${txt}</button>`;
}
/* ----- undo / redo (per-schedule snapshot stack) ----- */
let undoStack=[], redoStack=[];
let gScroll={left:0,top:0}, gCenteredPid=null;   // remember timeline scroll across renders; auto-center on today once per schedule
let _gLeft=null, _gRight=null;                   // cached gantt panes (refreshed each render) so hot scroll/pan handlers skip getElementById
function snapProject(){ const pid=activeId(); return { pid, data: JSON.stringify(state.projects[pid]||{}) }; }
function pushUndo(){ if(!activeId()) return; undoStack.push(snapProject()); if(undoStack.length>60) undoStack.shift(); redoStack=[]; }
function applySnap(s){ state.projects[s.pid]=JSON.parse(s.data); state.meta.activeProjectId=s.pid; recomputeActive(); render(); saveActive(); }
function undo(){ if(!undoStack.length) return toast('Nothing to undo','warn'); redoStack.push(snapProject()); applySnap(undoStack.pop()); toast('Undone'); }
function redo(){ if(!redoStack.length) return toast('Nothing to redo','warn'); undoStack.push(snapProject()); applySnap(redoStack.pop()); toast('Redone'); }
function saveCompanies(){ saveLocal(); fb.set('companies', state.companies); }
function saveHolidays(){ saveLocal(); fb.set('holidays', state.holidays); }
function saveTemplates(){ saveLocal(); fb.set('templates', state.templates); }

async function seedIfNeeded(){
  if(!await fb.get('companies')) await fb.set('companies', state.companies);
  if(!await fb.get('templates')) await fb.set('templates', state.templates);
  if(!await fb.get('holidays')) await fb.set('holidays', state.holidays);
  const projs=await fb.get('projects');
  if(!projs){ ensureActive(); await fb.set('projects/'+activeId(), activeProject()); await fb.set('meta', state.meta); }
  if(!await fb.get('infoflow/config')) await fb.set('infoflow/config', { topics:['Elevator Coordination','Mix Designs','Submittals','Permits','General'] });
}
let metaFirst=true, projFirst=true;
function localAhead(){ try{ return localStorage.getItem('la_dirty')==='1'; }catch(e){ return false; } }
function attachListeners(){
  fb.listen('companies', v=>{ if(v){ state.companies=v; saveLocal(); render(); } });
  fb.listen('holidays',  v=>{ state.holidays=v||{}; saveLocal(); recomputeActive(); render(); });
  fb.listen('templates', v=>{ if(v){ state.templates=v; saveLocal(); } });
  fb.listen('meta',      v=>{ if(metaFirst){ metaFirst=false; if(localAhead()) return; } if(v){ state.meta=v; ensureActive(); recomputeActive(); render(); } });
  fb.listen('projects',  v=>{ if(projFirst){ projFirst=false; if(localAhead()){ saveNow({force:true}); return; } } state.projects=v||{}; ensureActive(); recomputeActive(); saveLocal(); render(); });
  if(db) db.ref('pours-user').on('value', s=>{ state.pours=s.val()||{}; if(state.nav==='schedule') render(); });
}

/* ============================================================ MUTATIONS */
function changeTaskField(tid, field, value){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  if(field==='days') value=Math.max(1, parseInt(value)||1);
  if(field==='lag') value=parseInt(value)||0;
  t[field]=value;
  recomputeActive(); render(); saveActive();
}
function toggleDep(tid){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  if(t.depMode==='afterPrev'){ t.depMode='manual'; t.start = state.resolved[tid]?.start || p.startDate; }
  else { t.depMode='afterPrev'; }
  recomputeActive(); render(); saveActive();
}
function addTask(sid){
  pushUndo();
  const p=activeProject(); const n=tasksOf(p,sid).length;
  const tid=uid('t_'); p.tasks[tid]={ sectionId:sid, order:n, name:'New task', companyId:companyList()[0]?.id||'webcor', days:1, depMode: n? 'afterPrev':'manual', depId:null, lag:0, linkedPourId:null, start:p.startDate };
  recomputeActive(); render(); saveActive();
}
function dupTask(tid){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  const copy=JSON.parse(JSON.stringify(t)); copy.order=(t.order||0)+0.5; const nid=uid('t_'); p.tasks[nid]=copy;
  renumber(p,t.sectionId); recomputeActive(); render(); saveActive();
}
function delTask(tid){ const p=activeProject(); if(!p.tasks[tid]) return; pushUndo(); const sid=p.tasks[tid].sectionId; delete p.tasks[tid]; if(sid) renumber(p,sid); recomputeActive(); render(); saveActive(); }
function moveTask(tid, dir){
  const p=activeProject(); const t=p.tasks[tid]; const arr=tasksOf(p,t.sectionId);
  const i=arr.findIndex(x=>x.id===tid); const j=i+dir; if(j<0||j>=arr.length) return;
  pushUndo();
  const a=arr[i], b=arr[j]; const ao=p.tasks[a.id].order; p.tasks[a.id].order=p.tasks[b.id].order; p.tasks[b.id].order=ao;
  recomputeActive(); render(); saveActive();
}
function renumber(p, sid){ tasksOf(p,sid).forEach((t,i)=>{ p.tasks[t.id].order=i; }); }
function addSection(){ pushUndo(); const p=activeProject(); const sid=uid('s_'); p.sections[sid]={name:'New Section', order:sectionList(p).length}; render(); saveActive(); }
function renameSection(sid,name){ pushUndo(); activeProject().sections[sid].name=name; saveActive(); }
function delSection(sid){ const p=activeProject(); if(!confirm('Delete this section and its tasks?')) return; pushUndo(); Object.keys(p.tasks).forEach(tid=>{ if(p.tasks[tid].sectionId===sid) delete p.tasks[tid]; }); delete p.sections[sid]; recomputeActive(); render(); saveActive(); }
function moveSection(sid,dir){ const p=activeProject(); const arr=sectionList(p); const i=arr.findIndex(x=>x.id===sid); const j=i+dir; if(j<0||j>=arr.length) return; pushUndo(); const a=arr[i],b=arr[j]; const ao=p.sections[a.id].order; p.sections[a.id].order=p.sections[b.id].order; p.sections[b.id].order=ao; render(); saveActive(); }
function duplicateSection(sid){
  const p=activeProject(); const src=p.sections[sid]; if(!src) return;
  pushUndo();
  const nsid=uid('s_'); p.sections[nsid]={ name: src.name+' (copy)', order: sectionList(p).length };
  const idmap={};
  tasksOf(p,sid).forEach(t=>{ const nid=uid('t_'); idmap[t.id]=nid; const c=JSON.parse(JSON.stringify(t)); c.sectionId=nsid; delete c.id; p.tasks[nid]=c; });
  Object.values(idmap).forEach(nid=>{ const t=p.tasks[nid]; if(t.depId && idmap[t.depId]) t.depId=idmap[t.depId]; });
  recomputeActive(); render(); saveActive(); toast('Section duplicated');
}

/* ============================================================ RENDER */
/* render() coalesces every caller into one paint per animation frame, so a burst of
   edits or remote Firebase updates rebuilds the DOM once instead of once-per-change. */
let _rafPending=false;
function render(){ if(_rafPending) return; _rafPending=true; requestAnimationFrame(()=>{ _rafPending=false; renderNow(); }); }
function renderNow(){
  ensureActive(); if(!Object.keys(state.resolved).length) recomputeActive();
  const p=activeProject();
  let view;
  if(state.nav==='attendance') view=attendanceView();
  else if(state.nav==='tools') view=toolsView();
  else if(state.nav==='infoflow') view=infoflowView();
  else if(state.nav==='settings') view=settingsPage();
  else view=builderView(p);
  const _gr=_gRight||document.getElementById('ganttRight'); if(_gr){ gScroll.left=_gr.scrollLeft; gScroll.top=_gr.scrollTop; }   // remember timeline scroll before rebuild
  $('#app').innerHTML = header() + view;
  afterRender();
}

/* ---------- GANTT (WYSIWYG preview) ---------- */
function ganttWindow(p){
  const res=state.resolved; let min=null,max=null;
  Object.values(res).forEach(r=>{ if(!min||r.start<min)min=r.start; if(!max||r.finish>max)max=r.finish; });
  if(!min){ min=max=p.startDate; }
  let start=min; while(dow(start)!==1) start=addDays(start,-1);
  let end=max; while(dow(end)!==0) end=addDays(end,1);
  const days=[]; let s=start; let g=0; while(parseYMD(s)<=parseYMD(end) && g++<800){ days.push(s); s=addDays(s,1); }
  return days;
}
function ganttPanel(p){
  const days=ganttWindow(p);
  const today=fmtYMD(new Date());
  const cellW=Math.max(12, Math.round(24*state.gz));
  const filt=state.gFilter, byStatus=state.gColor==='status';
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DW=['S','M','T','W','T','F','S'];
  let monthRow=''; let i=0;

function syncGanttScroll(){ const l=_gLeft||document.getElementById('ganttLeft'), r=_gRight||document.getElementById('ganttRight'); if(l&&r) l.scrollTop=r.scrollTop; }
function ganttWheel(e){ const r=_gRight||document.getElementById('ganttRight'); if(r){ r.scrollTop+=e.deltaY; if(e.cancelable) e.preventDefault(); } }
function startPan(e){
  if(e.button!==undefined && e.button!==0) return;
  const r=_gRight||document.getElementById('ganttRight'); if(!r) return;
  const sx=e.clientX, sy=e.clientY, sl=r.scrollLeft, st=r.scrollTop;
  r.classList.add('panning');
  function move(ev){ r.scrollLeft=sl-(ev.clientX-sx); r.scrollTop=st-(ev.clientY-sy); syncGanttScroll(); }
  function up(){ r.classList.remove('panning'); document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); }
  document.addEventListener('mousemove',move); document.addEventListener('mouseup',up); e.preventDefault();
}
/* Crosshair runs on every mousemove; coalesce to one job per animation frame so we do at most
   one getBoundingClientRect + elementFromPoint hit-test per frame instead of per event. */
let _crossRAF=false, _crossEv=null;
function ganttCross(e){ _crossEv={clientX:e.clientX, clientY:e.clientY}; if(_crossRAF) return; _crossRAF=true; requestAnimationFrame(crossTick); }
function crossTick(){
  _crossRAF=false; const e=_crossEv; if(!e) return;
  const r=_gRight||document.getElementById('ganttRight'); if(!r){ ganttCrossHide(); return; }
  const rect=r.getBoundingClientRect();
  if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom){ ganttCrossHide(); return; }
  let ov=document.getElementById('gxhair');
  if(!ov){ ov=document.createElement('div'); ov.id='gxhair'; ov.innerHTML='<div class="gxv"></div><div class="gxh"></div><div class="gxlab"></div>'; document.body.appendChild(ov); }
  const v=ov.children[0], h=ov.children[1], lab=ov.children[2];
  v.style.left=e.clientX+'px'; v.style.top=rect.top+'px'; v.style.height=rect.height+'px'; v.style.width='1px';
  h.style.top=e.clientY+'px'; h.style.left=rect.left+'px'; h.style.width=rect.width+'px'; h.style.height='1px';
  let txt='';
  try{ const el=document.elementFromPoint(e.clientX,e.clientY); const cell=el&&el.closest('td,th'); const tbl=r.querySelector('table');
    if(cell&&tbl&&tbl.tHead&&cell.cellIndex>=0){ const hr=tbl.tHead.rows[tbl.tHead.rows.length-1]; const th=hr.cells[cell.cellIndex]; if(th&&th.dataset.d) txt=fmtMD(th.dataset.d); } }catch(_){}
  if(txt){ lab.textContent=txt; lab.style.display='block'; lab.style.left=Math.min(e.clientX+12, rect.right-56)+'px'; lab.style.top=(rect.top+4)+'px'; }
  else lab.style.display='none';
  ov.style.display='block';
}
function ganttCrossHide(){ const ov=document.getElementById('gxhair'); if(ov) ov.style.display='none'; }
function toggleGanttFull(){ state.gFull=!state.gFull; render(); }
function startColResize(e){
  e.preventDefault(); e.stopPropagation();
  const handle=e.currentTarget; handle&&handle.classList.add('dragging');
  const startX=(e.touches?e.touches[0].clientX:e.clientX);
  const startW=state.ganttNameW||156;
  const left=_gLeft||document.getElementById('ganttLeft');
  function move(ev){ const x=(ev.touches?ev.touches[0].clientX:ev.clientX); const w=Math.max(90, Math.min(480, Math.round(startW+(x-startX)))); state.ganttNameW=w; if(left){ left.style.width=(w+282)+'px'; left.style.minWidth=(w+282)+'px'; left.style.setProperty('--gw-task', w+'px'); } if(ev.cancelable) ev.preventDefault(); }
  function up(){ handle&&handle.classList.remove('dragging');
    document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up);
    try{ localStorage.setItem('la_gnameW', String(state.ganttNameW)); }catch(e){}
    if(state.gFit) fitGantt();
  }
  document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
}
function fitGantt(){
  if(!state.gFit) return;
  const r=_gRight||document.getElementById('ganttRight'); if(!r) return;
  const tbl=r.querySelector('table'); if(!tbl) return;
  const left=_gLeft||document.getElementById('ganttLeft'); const ltbl=left&&left.querySelector('table');
  // horizontal — shrink day columns so the whole timeline fits
  const days=+tbl.dataset.days||1;
  const w=Math.max(3, Math.min(26, Math.floor((r.clientWidth-6)/days)));   // shrink to fit; never stretch past normal
  tbl.style.setProperty('--dayw', w+'px');
  tbl.classList.toggle('tiny', w<11);
  // vertical — shrink row heights so the whole schedule fits the pane height
  const bands=tbl.querySelectorAll('tbody tr.secband').length;
  const taskRows=(tbl.tBodies[0]?tbl.tBodies[0].rows.length:0)-bands;
  const headH=tbl.tHead?tbl.tHead.offsetHeight:48;
  const avail=r.clientHeight-headH-2;
  let rowh=33, bandh=38;
  if(taskRows>0 && avail>0){
    // solve taskRows*rowh + bands*(rowh+3) <= avail; min 20px = floor the tightened left controls reach (keeps panes aligned)
    rowh=Math.max(20, Math.min(33, Math.floor((avail - bands*3)/(taskRows+bands))));
    bandh=Math.max(20, Math.min(38, rowh+3));
  }
  [tbl, ltbl].forEach(t=>{ if(!t)return; t.style.setProperty('--rowh', rowh+'px'); t.style.setProperty('--bandh', bandh+'px'); t.classList.toggle('fitv', rowh<28); });
}
function ganttSetDay(tid, day){
  const p=activeProject(); const t=p.tasks[tid]; const r=state.resolved[tid]; if(!t||!r) return;
  if(day < r.start) return; // can't end before it starts
  pushUndo();
  let nd;
  if(day===r.finish) nd=Math.max(1, workingDaysBetween(r.start, r.finish, state.holidays).length - 1); // click last day → remove it
  else nd=Math.max(1, workingDaysBetween(r.start, day, state.holidays).length);             // click elsewhere → end there
  t.days=nd; recomputeActive(); render(); saveActive();
}

/* ============================================================ STATUS */
const STATUS=[
  {id:'todo',  label:'Not started', color:'#6b7686', icon:'radio_button_unchecked'},
  {id:'doing', label:'In progress', color:'#2f80ed', icon:'pending'},
  {id:'done',  label:'Done',        color:'#41A447', icon:'check_circle'},
];
function taskStatus(t){ return t.status||'todo'; }
function statusMeta(id){ return STATUS.find(s=>s.id===id)||STATUS[0]; }
function setTaskStatus(tid,st){ const p=activeProject(); const t=p.tasks[tid]; if(!t)return; pushUndo(); t.status=st; render(); saveActive(); }
/* Search filters rows in place (toggle display) instead of rebuilding the whole Gantt — the
   input keeps focus/caret natively and nothing re-renders on each keystroke. */
function gSearchInput(v){ state.gSearch=v; filterGantt(); }
function laSearchInput(v){ state.laSearch=v; filterLA(); }
function filterRows(scope){
  const q=(state.gSearch||'').trim().toLowerCase(); const sec={};
  scope.querySelectorAll('tr[data-tid]').forEach(tr=>{ const m=!q||(tr.dataset.q||'').includes(q); tr.style.display=m?'':'none'; if(m) sec[tr.dataset.sid]=1; });
  scope.querySelectorAll('tr[data-band]').forEach(tr=>{ tr.style.display=(!q||sec[tr.dataset.band])?'':'none'; });
}
function filterGantt(){ const l=_gLeft||document.getElementById('ganttLeft'); if(l) filterRows(l); const r=_gRight||document.getElementById('ganttRight'); if(r) filterRows(r); }
function filterLA(){
  const q=(state.laSearch||'').trim().toLowerCase();
  document.querySelectorAll('.la-cells').forEach(cell=>{ let any=false;
    cell.querySelectorAll('.la-chip').forEach(ch=>{ const m=!q||(ch.dataset.q||'').includes(q); ch.style.display=m?'':'none'; if(m) any=true; });
    const e=cell.querySelector('.la-empty'); if(e) e.style.display=any?'none':''; });
}
function cycleStatus(tid){ const order=['todo','doing','done']; const cur=taskStatus(activeProject().tasks[tid]); setTaskStatus(tid, order[(order.indexOf(cur)+1)%3]); }
function orderedTaskIds(){ const p=activeProject(); const out=[]; sectionList(p).forEach(s=>tasksOf(p,s.id).forEach(t=>out.push(t.id))); return out; }
function bubbleClick(tid, shift){
  const p=activeProject(); if(!p.tasks[tid]) return;
  if(shift && state.lastTask && p.tasks[state.lastTask]){
    const ids=orderedTaskIds(); let i=ids.indexOf(state.lastTask), j=ids.indexOf(tid);
    if(i<0||j<0){ cycleStatus(tid); state.lastTask=tid; return; }
    if(i>j){ const t=i; i=j; j=t; }
    const target = taskStatus(p.tasks[tid])==='done' ? 'todo' : 'done';   // shift-click toggles the range
    pushUndo();
    for(let k=i;k<=j;k++){ if(p.tasks[ids[k]]) p.tasks[ids[k]].status=target; }
    render(); saveActive();
    toast(`${j-i+1} task${j-i?'s':''} marked ${statusMeta(target).label.toLowerCase()}`);
  } else {
    cycleStatus(tid);
  }
  state.lastTask=tid;
}

/* ============================================================ LOOK-AHEAD (3-week) */
function weekMonday(ymd){ let s=ymd; while(dow(s)!==1) s=addDays(s,-1); return s; }
/* one pass over tasks builds a {day:[tasks]} map for the whole visible window,
   instead of scanning every task once per day (was O(days × tasks)). */
function tasksByDayMap(p, days){
  const map={}; days.forEach(d=>map[d]=[]);
  Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(!r) return;
    days.forEach(d=>{ if(r.start<=d && d<=r.finish && isWorkday(d,state.holidays)) map[d].push({tid,...t}); });
  });
  Object.values(map).forEach(a=>a.sort((a,b)=>(a.sectionId+a.order).localeCompare(b.sectionId+b.order)));
  return map;
}
function lookAheadView(p){
  const today=fmtYMD(new Date());
  let wkStart=weekMonday(today); for(let i=0;i<state.laOffset;i++) wkStart=addDays(wkStart,7);
  const DW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const lq=(state.laSearch||'').trim().toLowerCase();
  const allDays=[]; for(let w=0;w<state.laWeeks;w++){ const ws=addDays(wkStart,w*7); for(let i=0;i<7;i++) allDays.push(addDays(ws,i)); }
  const dayMap=tasksByDayMap(p, allDays);
  let weeks='';
  for(let w=0; w<state.laWeeks; w++){
    const ws=addDays(wkStart, w*7);
    const days=[]; for(let i=0;i<7;i++) days.push(addDays(ws,i));
    const cols=days.map((d,i)=>{
      const hol=isHoliday(d,state.holidays);
      const chips=(dayMap[d]||[]).map(t=>{
        const c=state.companies[t.companyId]||{color:'#888',letter:'?'}; const done=taskStatus(t)==='done'; const st=statusMeta(taskStatus(t));
        return `<div class="la-chip" data-q="${esc(((t.name||'')+' '+(c.name||'')).toLowerCase())}" style="border-left:3px solid ${c.color};${done?'opacity:.55':''}" onclick="openTaskQuick('${t.tid}')" title="${esc(t.name)} · ${esc(c.name)} · ${st.label} (click to edit)">
          <span class="codot" style="width:15px;height:15px;font-size:8px;background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
          <span class="truncate ${done?'line-through':''}">${esc(t.name)}</span></div>`;
      }).join('');
      return `<div class="la-day ${isWeekend(d)?'wknd':''} ${d===today?'today':''}">
        <div class="la-dhead">${DW[i]} <span class="mono text-white/45">${fmtMD(d)}</span>${hol?`<div class="text-[9px]" style="color:var(--error)">${esc(state.holidays[d])}</div>`:''}</div>
        <div class="la-cells">${chips}<div class="la-empty text-white/20 text-xs px-1.5 py-1" style="display:none">—</div></div></div>`;
    }).join('');
    weeks+=`<div class="card mb-3 p-3">
      <div class="lcaps mb-2" style="color:var(--blue)">Week of ${fmtMD(ws)}${w===0&&state.laOffset===0?' · This week':''}</div>

  }
  return `
    <div class="flex items-center gap-2 mb-3 flex-wrap">

      <span class="text-xs text-white/45 ml-2">Showing</span>
      <select class="fld" onchange="state.laWeeks=+this.value; render()">${[2,3,4,6].map(n=>`<option value="${n}" ${n===state.laWeeks?'selected':''}>${n} weeks</option>`).join('')}</select>
      <div class="srch ml-auto"><span class="ms srch-i">search</span><input id="laSearchBox" class="fld srch-in" style="width:170px" placeholder="Find a task…" value="${esc(state.laSearch||'')}" oninput="laSearchInput(this.value)">${state.laSearch?`<span class="ms srch-x" onclick="state.laSearch='';render()">close</span>`:''}</div>
    </div>
    ${lq?`<div class="text-xs text-white/45 mb-2">Showing tasks matching “${esc(state.laSearch)}” — <span class="cursor-pointer underline" onclick="state.laSearch='';render()">clear</span></div>`:''}
    ${weeks}`;
}

/* ============================================================ CREW VIEW */
function crewWorkload(p){ const m={}; Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(!r)return; m[t.companyId]=(m[t.companyId]||0)+(Number(t.days)||0); }); return m; }   // a task spans exactly its `days` working days (finish = workday(start, days-1))
const NON_CREW=new Set(['cure','inspect','pour','survey']); // passive / events: not crew-conflicts
function crewConflicts(p){
  const days=ganttWindow(p); const out=[];
  days.forEach(d=>{ if(!isWorkday(d,state.holidays))return;
    const byCo={};
    Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(r&&r.start<=d&&d<=r.finish&&!NON_CREW.has(t.companyId)) (byCo[t.companyId]=byCo[t.companyId]||[]).push({tid,...t}); });
    Object.entries(byCo).forEach(([cid,arr])=>{ const secs=new Set(arr.map(x=>x.sectionId)); if(secs.size>1) out.push({company:cid,day:d,tasks:arr,secs:[...secs]}); });
  });
  return out;
}
function crewView(p){
  const wl=crewWorkload(p);
  const conflicts=crewConflicts(p);
  // conflict summary: per company, count of conflicted days
  const byCo={}; conflicts.forEach(c=>{ byCo[c.company]=byCo[c.company]||new Set(); byCo[c.company].add(c.day); });
  const confCards=Object.keys(byCo).length ? Object.entries(byCo).map(([cid,daySet])=>{
    const c=state.companies[cid]||{name:cid,color:'#888',letter:'?'};
    return `<div class="flex items-center gap-2 px-3 py-2 rounded" style="background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.25)">
      <span class="codot" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
      <span class="font-semibold">${esc(c.name)}</span>
      <span class="text-white/60 text-sm">double-booked across grid lines on <b style="color:var(--error)">${daySet.size}</b> day${daySet.size>1?'s':''}</span>
      <span class="mono text-xs text-white/40 ml-auto">${[...daySet].slice(0,6).map(fmtMD).join(', ')}${daySet.size>6?'…':''}</span></div>`;
  }).join('') : `<div class="px-3 py-2 rounded text-sm" style="background:rgba(65,164,71,.1);border:1px solid rgba(65,164,71,.25);color:#86e08f">✓ No crew double-booked across grid lines.</div>`;
  // per-crew task groups
  const groups=companyList().filter(c=>wl[c.id]).sort((a,b)=>wl[b.id]-wl[a.id]).map(c=>{
    const tks=Object.entries(p.tasks).filter(([,t])=>t.companyId===c.id).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r).sort((a,b)=>a.r.start.localeCompare(b.r.start));
    const doneN=tks.filter(t=>taskStatus(t)==='done').length;
    const hidden=!!state.crewHide[c.id];
    const rows=hidden?'':tks.map(t=>{ const sec=p.sections[t.sectionId]?.name||''; const st=statusMeta(taskStatus(t)); const done=taskStatus(t)==='done';
      return `<div class="flex items-center gap-2 px-2 py-1 text-sm border-b border-white/5">
        <button class="crewbub" style="color:${st.color}" title="${esc(st.label)} — click to advance · shift-click to mark a range" onclick="event.stopPropagation(); bubbleClick('${t.tid}', event.shiftKey)"><span class="ms text-[16px]">${st.icon}</span></button>
        <span class="flex-1 truncate ${done?'line-through text-white/45':''}">${esc(t.name)} <span class="text-white/35 text-xs">· ${esc(sec)}</span></span>
        <span class="mono text-xs text-white/55">${fmtMD(t.r.start)}–${fmtMD(t.r.finish)}</span></div>`;}).join('');
    return `<div class="card overflow-hidden">
      <div class="flex items-center gap-2 px-3 py-2 cursor-pointer select-none" style="background:rgba(255,255,255,.03)" onclick="state.crewHide['${c.id}']=!state.crewHide['${c.id}']; render()" title="${hidden?'Show':'Hide'} ${esc(c.name)} tasks">
        <span class="ms text-[18px] text-white/45" style="transition:transform .15s;transform:rotate(${hidden?-90:0}deg)">expand_more</span>
        <span class="codot" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
        <span class="display font-semibold flex-1">${esc(c.name)}</span>
        <span class="text-xs text-white/45 mr-2">${doneN}/${tks.length} done</span>
        <span class="lcaps">${wl[c.id]} working days</span></div>
      ${rows}</div>`;
  }).join('');
  return `
    <div class="card p-3 mb-3"><div class="lcaps mb-2">Workload — working days per crew</div><div style="height:230px"><canvas id="crewChart"></canvas></div></div>
    <div class="card p-3 mb-3"><div class="lcaps mb-2">Crew conflicts</div><div class="space-y-1.5">${confCards}</div></div>
    <div class="flex items-center gap-2 mb-2"><div class="lcaps">Tasks by crew</div><span class="text-xs text-white/35">— click a status bubble to mark done · click a crew header to show/hide</span></div>
    <div class="grid md:grid-cols-2 gap-3 mb-2">${groups}</div>
    <div class="text-xs text-white/35">Crews, holidays, and the cycle template live in <span class="cursor-pointer underline" onclick="setNav('settings')">Settings</span> <span class="ms text-[13px]">settings</span>.</div>`;
}
function drawCrewChart(){
  const p=activeProject(); const wl=crewWorkload(p);
  const cos=companyList().filter(c=>wl[c.id]).sort((a,b)=>wl[b.id]-wl[a.id]);
  drawChart('crewChart',{ type:'bar',
    data:{ labels:cos.map(c=>c.name), datasets:[{ data:cos.map(c=>wl[c.id]), backgroundColor:cos.map(c=>c.color), borderRadius:4 }] },

}

/* ============================================================ PROGRESS VIEW */
function progressView(p){
  const tasks=Object.entries(p.tasks).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r);
  const cnt={todo:0,doing:0,done:0}; let totWd=0, doneWd=0;
  tasks.forEach(t=>{ cnt[taskStatus(t)]++; const wd=Number(t.days)||0; totWd+=wd; if(taskStatus(t)==='done') doneWd+=wd; });
  const pct=totWd?Math.round(doneWd/totWd*100):0;
  const list=tasks.sort((a,b)=>a.r.start.localeCompare(b.r.start)).map(t=>{
    const c=state.companies[t.companyId]||{color:'#888',letter:'?'};
    const btns=STATUS.map(s=>`<button class="icobtn" title="${s.label}" onclick="setTaskStatus('${t.tid}','${s.id}')" style="${taskStatus(t)===s.id?'color:'+s.color+';background:rgba(255,255,255,.06)':''}"><span class="ms text-[18px]">${s.icon}</span></button>`).join('');
    return `<div class="flex items-center gap-2 px-2 py-1.5 border-b border-white/5">
      <span class="codot" style="width:18px;height:18px;font-size:9px;background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
      <span class="flex-1 truncate text-sm">${esc(t.name)} <span class="text-white/30 text-xs">· ${esc(p.sections[t.sectionId]?.name||'')}</span></span>
      <span class="mono text-xs text-white/45">${fmtMD(t.r.start)}–${fmtMD(t.r.finish)}</span>
      <div class="flex gap-0.5">${btns}</div></div>`;
  }).join('');
  return `
    <div class="flex gap-2 mb-3 flex-wrap">
      ${statCard('Complete', pct+'%', 'task_alt', pct>=100?'#41A447':null)}
      ${statCard('Done', cnt.done, 'check_circle', '#41A447')}
      ${statCard('In progress', cnt.doing, 'pending', '#2f80ed')}
      ${statCard('Not started', cnt.todo, 'radio_button_unchecked')}
    </div>
    <div class="grid md:grid-cols-2 gap-3 mb-3">
      <div class="card p-3"><div class="lcaps mb-2">Status</div><div style="height:230px"><canvas id="statusDonut"></canvas></div></div>
      <div class="card p-3"><div class="lcaps mb-2">Progress — planned vs done (cumulative working days)</div><div style="height:230px"><canvas id="sCurve"></canvas></div></div>
    </div>
    <div class="card overflow-hidden"><div class="lcaps px-3 py-2" style="background:rgba(255,255,255,.03)">Set task status</div><div class="scroll" style="max-height:46vh">${list}</div></div>`;
}
function drawProgressCharts(){
  const p=activeProject();
  const cnt={todo:0,doing:0,done:0}; Object.values(p.tasks).forEach(t=>cnt[taskStatus(t)]++);
  drawChart('statusDonut',{ type:'doughnut',
    data:{ labels:['Not started','In progress','Done'], datasets:[{ data:[cnt.todo,cnt.doing,cnt.done], backgroundColor:['#6b7686','#2f80ed','#41A447'], borderWidth:0 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{legend:{position:'bottom',labels:{color:'#dbe4ef',boxWidth:12}}} } });
  const days=ganttWindow(p); const labels=[],planned=[],actual=[];
  const tasks=Object.entries(p.tasks).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r);
  days.forEach((d,i)=>{ if(i%3!==0 && i!==days.length-1) return; let pl=0,ac=0;
    tasks.forEach(t=>{ const wd=Number(t.days)||0; if(t.r.finish<=d){ pl+=wd; if(taskStatus(t)==='done') ac+=wd; } });
    labels.push(fmtMD(d)); planned.push(pl); actual.push(ac); });
  drawChart('sCurve',{ type:'line',
    data:{ labels, datasets:[
      {label:'Planned',data:planned,borderColor:'#2f80ed',backgroundColor:'rgba(47,128,237,.15)',fill:true,tension:.3,pointRadius:0},
      {label:'Actual (done)',data:actual,borderColor:'#41A447',backgroundColor:'rgba(65,164,71,.12)',fill:true,tension:.3,pointRadius:0} ] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#dbe4ef',boxWidth:12}}},
      scales:{ x:{ticks:{color:'#97a6bb',maxTicksLimit:9,font:{size:10}},grid:{display:false}}, y:{beginAtZero:true,ticks:{color:'#97a6bb'},grid:{color:'rgba(255,255,255,.06)'}} } } });
}

let chartReg={};
function ensureChart(){ if(window.Chart) return Promise.resolve(); return loadScript('https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js').then(()=>{ if(window.Chart){ window.Chart.defaults.animation=false; window.Chart.defaults.font.family='Inter'; window.Chart.defaults.color='#97a6bb'; } }); }
function drawChart(id,cfg){ const cv=document.getElementById(id); if(!cv||!window.Chart) return; if(chartReg[id]) chartReg[id].destroy(); chartReg[id]=new window.Chart(cv.getContext('2d'),cfg); }
function afterRender(){
  _gLeft=document.getElementById('ganttLeft'); _gRight=document.getElementById('ganttRight');   // refresh cached panes for hot handlers
  if(state.nav==='tools'){ if(state.tools.tab!=='list') ensureChart().then(drawToolsCharts); return; }
  if(state.nav!=='schedule') return;
  if(state.view==='build'){
    if(state.gFit) fitGantt();
    filterGantt();                                  // re-apply the live search filter to the freshly built rows
    const gr=_gRight;
    if(gr){
      const pid=activeId();
      if(gCenteredPid!==pid){                       // first open of this schedule → land on today
        document.getElementById('todayCol')?.scrollIntoView({inline:'center',block:'nearest'});
        gCenteredPid=pid; gScroll.left=gr.scrollLeft; gScroll.top=gr.scrollTop;
      } else {                                       // otherwise keep where the user was (don't snap to start on every edit)
        gr.scrollLeft=gScroll.left; gr.scrollTop=gScroll.top; syncGanttScroll();
      }
    }
  }
  else if(state.view==='lookahead') filterLA();
  else if(state.view==='crew') ensureChart().then(()=>{ drawCrewChart(); });
  else if(state.view==='progress') ensureChart().then(drawProgressCharts);
}

function deleteProject(){

function syncPours(){

async function exportPDF(mode){
  closeModal(); const p=activeProject(); recomputeActive();
  try{ await ensureLibs(); }catch(e){ return toast('Could not load PDF library','err'); }
  const { jsPDF } = window.jspdf;
  const days=ganttWindow(p); const rows=scheduleRows(p);
  const today=fmtYMD(new Date());
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DW=['S','M','T','W','T','F','S'];

  function drawHeaderBlock(doc, pageW){

    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,100,115);
    doc.text('Exported '+today, pageW-MARGIN, 26, {align:'right'});
    doc.setDrawColor(47,128,237); doc.setLineWidth(1.2); doc.line(MARGIN, 40, pageW-MARGIN, 40);
    // legend
    let lx=MARGIN, ly=54; doc.setFontSize(8);
    companyList().forEach(c=>{
      const w=22 + doc.getTextWidth(c.name) + 10;
      if(lx+w > pageW-MARGIN){ lx=MARGIN; ly+=16; }
      const [r,g,b]=hexToRgb(c.color); doc.setFillColor(r,g,b); doc.roundedRect(lx, ly-8, 16, 11, 2,2,'F');
      const to=textOn(c.color)==='#111111'?[17,17,17]:[255,255,255]; doc.setTextColor(...to); doc.setFont('helvetica','bold');
      doc.text(c.letter, lx+8, ly, {align:'center'});

  let doc;

    const bodyRows = rows.length;
    const pageH = mode==='wide' ? Math.max(612, HEADERTOP + (bodyRows+2)*ROWH + MARGIN) : 612;
    if(ci===0){ doc=new jsPDF({orientation:'landscape', unit:'pt', format:[pageW,pageH]}); }

    const head1 = [{content:'Task',styles:{halign:'left'}},'Start','Finish','Days','Color','Company'];
    // month spans + day numbers as two header rows
    const monthCells=[]; let i=0; while(i<chunk.length){ const m=chunk[i].slice(0,7); let span=0; while(i+span<chunk.length && chunk[i+span].slice(0,7)===m) span++; const d=parseYMD(chunk[i]); monthCells.push({content:MON[d.getMonth()], colSpan:span, styles:{halign:'left',fillColor:[235,238,242]}}); i+=span; }
    const dayCells=chunk.map(d=>({content:String(Number(d.slice(8))), styles:{fillColor: isHoliday(d,state.holidays)?[250,225,225]:isWeekend(d)?[225,230,238]:[245,247,250]}}));
    const head=[ head1.concat(monthCells), ['','','','','',''].concat(dayCells) ];
    // span the 6 label headers across both header rows by using rowSpan on first row & blanks on second
    head[0]=[{content:'Task',rowSpan:2,styles:{halign:'left',valign:'middle'}},{content:'Start',rowSpan:2,styles:{valign:'middle'}},{content:'Finish',rowSpan:2,styles:{valign:'middle'}},{content:'Days',rowSpan:2,styles:{valign:'middle'}},{content:'Color',rowSpan:2,styles:{valign:'middle'}},{content:'Company',rowSpan:2,styles:{valign:'middle'}}].concat(monthCells);
    head[1]=dayCells;

    // body
    const fills={}; // 'rowIdx:colIdx' -> {color, letter}
    const body=rows.map((row, ri)=>{
      if(row.type==='section'){ return [{content:row.name, colSpan:6+chunk.length, styles:{fillColor:[31,78,121], textColor:[255,255,255], fontStyle:'bold', halign:'left'}}]; }
      const dcells=chunk.map((d,j)=>{
        const within = row.start && d>=row.start && d<=row.finish && isWorkday(d,state.holidays);
        if(within){ fills[ri+':'+(6+j)]={color:row.color||'#888', letter:row.letter||''}; return ''; }
        return '';
      });
      return [row.name, fmtMD(row.start), fmtMD(row.finish), String(row.days), row.colorName||'', row.companyName||''].concat(dcells);
    });

    const colStyles={0:{cellWidth:LABELW[0],halign:'left'},1:{cellWidth:LABELW[1],halign:'center'},2:{cellWidth:LABELW[2],halign:'center'},3:{cellWidth:LABELW[3],halign:'center'},4:{cellWidth:LABELW[4],halign:'center'},5:{cellWidth:LABELW[5],halign:'center'}};
    chunk.forEach((d,j)=>{ colStyles[6+j]={cellWidth: mode==='wide'?DAYW:undefined, halign:'center', fillColor: isHoliday(d,state.holidays)?[250,228,228]:isWeekend(d)?[232,236,242]:[255,255,255]}; });

    doc.autoTable({
      head, body, startY: HEADERTOP,

      headStyles:{fontSize:6.5, fillColor:[245,247,250], textColor:[40,48,60], lineWidth:0.3},
      columnStyles: colStyles,

          const to=textOn(f.color)==='#111111'?[17,17,17]:[255,255,255]; doc.setTextColor(...to); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
          doc.text(f.letter, data.cell.x+data.cell.width/2, data.cell.y+data.cell.height/2+2, {align:'center'}); }
      },
    });
  });
  const blob=doc.output('blob');
  const stamp=today.split('-'); await sharePdf(blob, `${slugName(p)}_${stamp[1]}.${stamp[2]}.${stamp[0]}.pdf`);
  toast('PDF ready','ok');
}

function ensurePdfjs(){ if(window.pdfjsLib) return Promise.resolve();
  return loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js').then(()=>{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; });
}
function parseAnyDate(v){
  if(v==null) return null; const s=String(v).trim(); if(!s) return null;
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m) return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){ let y=m[3]; if(y.length===2) y='20'+y; return `${y}-${pad(+m[1])}-${pad(+m[2])}`; }
  m=s.match(/^(\d{1,2})\/(\d{1,2})$/); if(m) return `${new Date().getFullYear()}-${pad(+m[1])}-${pad(+m[2])}`;
  const d=new Date(s); if(!isNaN(d)) return fmtYMD(d);
  return null;
}
const IMP_KNOWN=['Bali','Webcor','WCG','Zarp','CMC','Sharma','Malcom','Malcolm','SME','Murray','Inspection','Cure','Pour','Survey','Delay'];
function normCompany(c){ if(!c) return ''; const m={wcg:'Webcor',webcor:'Webcor',malcolm:'Malcom'}; return m[c.toLowerCase()]||c.trim(); }
function resolveCompany(name){
  if(!name) return companyList()[0]?.id || 'webcor';
  const n=normCompany(name).toLowerCase();
  for(const [id,c] of Object.entries(state.companies)){ if(c.name.toLowerCase()===n || (c.letter||'').toLowerCase()===n) return id; }
  const palette=['#7E57C2','#E0639B','#B5651D','#D2691E','#00897B','#C0CA33','#5C6BC0','#26A69A'];
  const id=uid('co_'); state.companies[id]={ name:normCompany(name), letter:normCompany(name).replace(/[^A-Za-z]/g,'').slice(0,2).toUpperCase()||'X', color:palette[Object.keys(state.companies).length%palette.length], order:companyList().length };
  return id;
}
async function parseSheetRows(file){
  await ensureLibs(); const buf=await file.arrayBuffer();
  const wb=window.XLSX.read(buf,{type:'array'});
  const sh=wb.SheetNames.find(n=>/sched/i.test(n))||wb.SheetNames[0];
  const aoa=window.XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:false,defval:''});
  return { rows:rowsFromAoa(aoa), source:'sheet' };
}
function rowsFromAoa(aoa){
  if(!aoa.length) return [];
  let hi=aoa.findIndex(r=>r.some(c=>/task|activity/i.test(String(c)))); if(hi<0) hi=0;
  const head=aoa[hi].map(c=>String(c).toLowerCase().trim());
  const col=(...keys)=>head.findIndex(h=>keys.some(k=>h.includes(k)));
  const ci={ name:col('task','activity','description'), start:col('start'), finish:col('finish','end'), days:col('days','duration','dur'), company:col('company','crew','sub','contractor'), section:col('section','grid','area','phase','group') };
  if(ci.name<0) ci.name=0;
  const rows=[]; let curSection='';
  for(let i=hi+1;i<aoa.length;i++){
    const r=aoa[i]; if(!r || r.every(c=>String(c).trim()==='')) continue;
    const name=String(r[ci.name]||'').trim();
    const startV=ci.start>=0?String(r[ci.start]||'').trim():'';
    const daysV=ci.days>=0?String(r[ci.days]||'').trim():'';
    const explicitSec=ci.section>=0?String(r[ci.section]||'').trim():'';
    if(explicitSec){ curSection=explicitSec; }
    // a row with only a name (no date/days, no other section concept) is a section band (our own export format)
    if(name && !startV && !daysV && ci.section<0 && r.filter(c=>String(c).trim()!=='').length<=1){ curSection=name; continue; }
    if(!name) continue;
    rows.push({ section:curSection, name, start:parseAnyDate(startV), finish:parseAnyDate(ci.finish>=0?r[ci.finish]:''), days:parseInt(daysV)||null, company:ci.company>=0?String(r[ci.company]||'').trim():'' });
  }
  return rows;
}
async function parsePdfRows(file){
  await ensurePdfjs(); const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise; const lines=[];
  for(let pn=1;pn<=pdf.numPages;pn++){
    const page=await pdf.getPage(pn); const tc=await page.getTextContent(); const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (byY[y]=byY[y]||[]).push(it); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{ const t=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim(); if(t) lines.push(t); });
  }
  return { rows:rowsFromPdfLines(lines), source:'pdf' };
}
function rowsFromPdfLines(lines){
  const secRe=/(grid ?line|pile ?caps|grade ?beams|^cup\s|^section\b|section \d|south hall|podium)/i;
  const dateG=/\d{1,2}\/\d{1,2}\/\d{2,4}/g;
  const rows=[]; let curSection='Schedule'; let buf='';
  const flush=()=>{ const b=buf.trim(); buf='';
    const dates=b.match(dateG); if(!dates||dates.length<2) return;
    let name=b.slice(0,b.indexOf(dates[0])).trim();
    let days=null; const g=b.match(/(\d+)(?=[A-Z][a-z])/); if(g) days=+g[1];
    if(days==null){ const a=b.slice(b.indexOf(dates[1])+dates[1].length).match(/\b(\d+)\b/); if(a) days=+a[1]; }
    let company=''; for(const k of IMP_KNOWN){ if(new RegExp(k,'i').test(b)){ company=k; break; } }
    name=name.replace(new RegExp('^('+IMP_KNOWN.join('|')+')\\s+','i'),'');
    name=name.replace(new RegExp('\\s+('+IMP_KNOWN.join('|')+')$','i'),'');
    name=name.replace(/\s*\d+[A-Za-z].*$/,'').replace(/(\s+[A-Z]\b)+\s*$/,'').trim();
    // reject title / header / legend noise that isn't a real task
    const NOISE=/^(la convention|look ?ahead|construction schedule|.*\bschedule\b|finish ?date|start ?date|task$|color$|company$|days$|legend|mon ?tue|^\d[\d.\/ ]*$)/i;
    if(name && name.length>2 && !NOISE.test(name)) rows.push({ section:curSection, name, start:parseAnyDate(dates[0]), finish:parseAnyDate(dates[1]), days, company:normCompany(company) });
  };
  lines.forEach(line=>{
    if(secRe.test(line) && !dateG.test(line) && line.length<55){ flush(); curSection=line.trim(); return; }
    buf+=' '+line; const d=buf.match(dateG); if(d&&d.length>=2) flush();
  });
  flush();
  return rows;
}
function buildScheduleFromRows(name, rows){

  const ord={};
  rows.forEach(r=>{ const sn=(r.section||'Schedule').trim()||'Schedule'; const sid=secId[sn]; const o=(ord[sid]=ord[sid]||0); ord[sid]++;
    let days=r.days; if(!days||days<1) days=(r.start&&r.finish)? workingDaysBetween(r.start,r.finish,state.holidays).length : 1;
    const tid=uid('t_'); proj.tasks[tid]={ sectionId:sid, order:o, name:r.name||'Task', companyId:resolveCompany(r.company), days, depMode:'manual', start:r.start||anchor, depId:null, lag:0, linkedPourId:null };
  });

const TOOL_BRANDS=['DEWALT','MILWAUKEE','MAKITA','HILTI','BOSCH','RIDGID','METABO','RYOBI','KNAACK','GREENLEE','STIHL','HUSQVARNA','WACKER','HONDA','GENERAC','FLUKE','LEICA','TOPCON','TRIMBLE','SPECTRA','MULTIQUIP','WAGNER','STANLEY','KLEIN','WERNER','PACO'];

function ifTopics(){ return (state.infoflow.config&&state.infoflow.config.topics)||['General']; }
function relTime(iso){ if(!iso) return ''; const t=new Date(iso); const s=(Date.now()-t.getTime())/1000;
  if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<604800) return Math.floor(s/86400)+'d ago'; return t.toLocaleDateString([],{month:'short',day:'numeric'}); }
function requireUnlock(){
  if(state.infoflow.unlocked) return true;

/* ============================================================ BOOT */
function boot(){
  loadLocal(); ensureActive(); recomputeActive(); renderNow();
  if(initFirebase()){ state.online=true; attachListeners(); seedIfNeeded().catch(e=>console.warn(e)); }
  else { state.online=false; }
  renderNow();
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape' && state.gFull){ state.gFull=false; render(); return; }
    const tag=(e.target&&e.target.tagName||'').toLowerCase();
    const typing = tag==='input'||tag==='textarea'||tag==='select'||(e.target&&e.target.isContentEditable);
    const mod=e.metaKey||e.ctrlKey;
    const k=e.key.toLowerCase();
    if(mod && k==='s'){ e.preventDefault(); if(document.activeElement&&document.activeElement.blur) document.activeElement.blur(); saveNow({manual:true}); return; }   // ⌘/Ctrl+S → save
    if(!mod && !typing && k==='v' && state.nav==='schedule' && state.view==='build' && state.showTimeline){ e.preventDefault(); state.gPan=!state.gPan; if(!state.gPan) ganttCrossHide(); render(); return; }   // v → toggle Pan
    if(!mod) return;
    const sched = state.nav==='schedule'||state.nav==='settings';
    if(k==='z' && sched){ e.preventDefault(); e.shiftKey?redo():undo(); }
    else if(k==='y' && sched){ e.preventDefault(); redo(); }
  });
  setInterval(()=>{ if(state.online && state.dirty && (state.pending||0) > 5) saveNow({auto:true}); }, 5*60*1000);   // auto-save every 5 min once >5 changes pile up
  window.addEventListener('beforeunload', e=>{ if(state.dirty && state.online) saveNow({force:true}); });           // best-effort flush on close
  let rzT=null; window.addEventListener('resize', ()=>{ clearTimeout(rzT); rzT=setTimeout(fitGantt, 120); });
}
document.addEventListener('DOMContentLoaded', boot);
</script>
