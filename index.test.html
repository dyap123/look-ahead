<style>

  /* data tables */
  .dt{ width:100%; border-collapse:collapse; font-size:13px; }

  /* gantt */
  .gantt{ border-collapse:separate; border-spacing:0; font-size:11px; }

  .gantt .hol{ background:rgba(255,180,171,.14); }
  .gantt .secband td{ background:rgba(0,83,219,.22); color:#dbe1ff; font-weight:700; padding:5px 10px; position:sticky; left:0; border-left:3px solid var(--blue-c); }
  .gantt .today{ box-shadow:inset 2px 0 0 var(--blue); }
  .scroll{ overflow:auto; }
  .scroll::-webkit-scrollbar{ height:10px; width:10px; } .scroll::-webkit-scrollbar-thumb{ background:rgba(137,148,130,.35); border-radius:6px; }
  /* editor rows */
  .secband-edit{ display:flex; align-items:center; gap:8px; padding:8px 12px; background:rgba(180,197,255,.06); border-left:3px solid var(--blue-c); }
  .trow{ display:grid; grid-template-columns: 18px 1fr 44px 104px 104px 40px 156px auto; gap:8px; align-items:center; padding:5px 10px; border-bottom:1px solid rgba(255,255,255,.05); }
  .trow:nth-child(even){ background:rgba(255,255,255,.015); }

  @media (max-width:880px){ .trow{ grid-template-columns: 16px 1fr 38px 96px 40px 130px auto; gap:6px; } .trow .col-finish{ display:none; } }
  /* look-ahead calendar */
  .la-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  @media (max-width:900px){ .la-grid{ grid-template-columns:repeat(2,1fr); } }
  .la-day{ background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:6px; min-height:92px; display:flex; flex-direction:column; }
  .la-day.wknd{ background:rgba(137,148,130,.05); }
  .la-day.today{ box-shadow:inset 0 0 0 1px var(--blue); }
  .la-dhead{ font-family:'Saira',sans-serif; font-weight:600; font-size:11px; padding:5px 7px; border-bottom:1px solid rgba(255,255,255,.06); color:var(--on-var); }
  .la-cells{ padding:5px; display:flex; flex-direction:column; gap:4px; }

  .la-chip:hover{ background:rgba(255,255,255,.09); }
  .la-chip .truncate{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modalwrap{ position:fixed; inset:0; background:rgba(0,0,0,.66); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .toast{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); padding:10px 16px; border-radius:8px; font-weight:600; font-size:13px; z-index:80; box-shadow:0 10px 30px -10px #000; }
</style>

<body>
<div id="app"></div>
<div id="modal"></div>
<div id="toast"></div>

<script>
/* ============================================================ STATE */
const NS = 'look-ahead-schedule';
const state = {
  nav: 'schedule',
  companies: {}, holidays: {}, templates: {}, meta: {}, projects: {}, pours: {},
  resolved: {}, online: false, showPreview: true, seeded: false, collapsed: {},
  view: 'build', laWeeks: 3, laOffset: 0, gz: 1, gFilter: 'all', gColor: 'company',
  tools: { assets:{}, config:{}, loaded:false, q:'', status:'all' },
  att: { dates:[], date:'', records:{}, foremen:{}, members:{}, areas:{}, loaded:false, loading:false },
};

/* ============================================================ HELPERS */
const $ = (s,el=document)=>el.querySelector(s);
const pad = n => String(n).padStart(2,'0');
const uid = p => p + Math.random().toString(36).slice(2,8);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, kind='ok'){
  const el=document.createElement('div'); el.className='toast';
  el.style.background = kind==='err' ? '#7f1d1d' : kind==='warn' ? '#92610a' : '#1f6b2a';
  el.style.color='#fff'; el.textContent=msg; $('#toast').appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}
function hexToRgb(h){ const c=h.replace('#',''); return [parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)]; }
function textOn(hex){ const [r,g,b]=hexToRgb(hex); return (0.299*r+0.587*g+0.114*b)/255 > 0.62 ? '#111111' : '#ffffff'; }

/* ============================================================ DATE ENGINE */
function parseYMD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d, 12); }
function fmtYMD(dt){ return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`; }
function addDays(s,n){ const d=parseYMD(s); d.setDate(d.getDate()+n); return fmtYMD(d); }
function dow(s){ return parseYMD(s).getDay(); } // 0=Sun .. 6=Sat
function isWeekend(s){ const d=dow(s); return d===0||d===6; }
function isHoliday(s,hol){ return !!(hol&&hol[s]); }
function isWorkday(s,hol){ return !isWeekend(s) && !isHoliday(s,hol); }
function workday(start,n,hol){
  let s=start; const step=n>=0?1:-1; let left=Math.abs(n);
  while(!isWorkday(s,hol)) s=addDays(s, step||1);
  while(left>0){ s=addDays(s,step); if(isWorkday(s,hol)) left--; }
  return s;
}
function taskFinish(start,days,hol){ return workday(start, Math.max(1, Number(days)||1)-1, hol); }
function workingDaysBetween(start,finish,hol){
  const out=[]; let s=start; let guard=0;
  while(parseYMD(s)<=parseYMD(finish) && guard++<3650){ if(isWorkday(s,hol)) out.push(s); s=addDays(s,1); }
  return out;
}
function fmtMD(ymd){ if(!ymd) return ''; const [y,m,d]=ymd.split('-'); return `${Number(m)}/${Number(d)}`; }

function computeProject(project, hol){
  const tasks = Object.entries(project.tasks||{}).map(([id,t])=>({id,...t}));
  const byId={}; tasks.forEach(t=>byId[t.id]=t);
  const bySection={}; tasks.forEach(t=>{ (bySection[t.sectionId]=bySection[t.sectionId]||[]).push(t); });
  Object.values(bySection).forEach(a=>a.sort((x,y)=>(x.order||0)-(y.order||0)));
  const prevInSection=t=>{ const a=bySection[t.sectionId]||[]; const i=a.findIndex(x=>x.id===t.id); return i>0?a[i-1]:null; };
  const memo={}, stack=new Set();
  function resolve(t){
    if(memo[t.id]) return memo[t.id];
    const anchor = t.start || project.startDate;
    if(stack.has(t.id)){ const s=workday(anchor,0,hol); return {start:s, finish:taskFinish(s,t.days,hol)}; }
    stack.add(t.id);
    let pred=null;
    if(t.depId && byId[t.depId]) pred=byId[t.depId];
    else if(t.depMode==='afterPrev') pred=prevInSection(t);
    let start;
    if(pred){ const pr=resolve(pred); start=workday(pr.finish, 1 + (Number(t.lag)||0), hol); }
    else { start=workday(anchor,0,hol); }
    const finish=taskFinish(start, t.days, hol);
    stack.delete(t.id);
    return memo[t.id]={start, finish};
  }
  tasks.forEach(resolve);
  return memo;
}

/* ============================================================ DEFAULT DATA */
const DEFAULT_COMPANIES = {
  webcor:  {name:'Webcor',     letter:'W',  color:'#3FA535', order:0},
  malcom:  {name:'Malcom',     letter:'M',  color:'#2F6FE0', order:1},
  cmc:     {name:'CMC',        letter:'R',  color:'#1FA89B', order:2},
  sme:     {name:'SME',        letter:'S',  color:'#F08C00', order:3},
  zarp:    {name:'Zarp',       letter:'Z',  color:'#E0A800', order:4},
  inspect: {name:'Inspection', letter:'I',  color:'#56B4E9', order:5},
  pour:    {name:'Pour',       letter:'P',  color:'#7CD12B', order:6},
  cure:    {name:'Cure',       letter:'CU', color:'#9AA3AD', order:7},
  bali:    {name:'Bali',       letter:'B',  color:'#7E57C2', order:8},
  sharma:  {name:'Sharma',     letter:'SH', color:'#E0639B', order:9},
  murray:  {name:'Murray',     letter:'M',  color:'#B5651D', order:10},
  survey:  {name:'Survey',     letter:'SV', color:'#D2691E', order:11},
  delay:   {name:'Delay',      letter:'D',  color:'#E53935', order:12},
};
const DEFAULT_HOLIDAYS = {
  '2026-07-03':'Independence Day (obs)', '2026-09-07':'Labor Day',
  '2026-11-26':'Thanksgiving', '2026-11-27':'Day after Thanksgiving',
  '2026-12-24':'Christmas Eve', '2026-12-25':'Christmas Day', '2027-01-01':'New Year’s Day',
};
const DEFAULT_TEMPLATES = {
  pileCapCycle: { name:'Pile Cap / Footing Cycle', tasks:[
    {name:'Layout Foundations',          companyId:'webcor',  days:1},
    {name:'Excavate Foundations',        companyId:'zarp',    days:2},
    {name:'Chip down overpoured piles',  companyId:'malcom',  days:2},
    {name:'Set formwork',                companyId:'webcor',  days:3},
    {name:'Rebar bottom / plinth',       companyId:'cmc',     days:2},
    {name:'Top steel / Shear pins',      companyId:'cmc',     days:2},
    {name:'Set anchor bolts',            companyId:'webcor',  days:2},
    {name:'Bill Car survey / SME',       companyId:'sme',     days:1},
    {name:'Inspection',                  companyId:'inspect', days:1},
    {name:'Pour',                        companyId:'pour',    days:1, linkPour:true},
    {name:'Strip formwork',              companyId:'webcor',  days:2},
    {name:'Backfill',                    companyId:'zarp',    days:2},
    {name:'Cure',                        companyId:'cure',    days:15},
  ]},
};
function defaultProject(){
  // anchor to next Monday from today
  let s=fmtYMD(new Date()); while(dow(s)!==1) s=addDays(s,1);
  const pid='laccfdn';
  const proj={ id:pid, name:'LA Convention Center', subtitle:'Look Ahead Schedule', startDate:s, sections:{}, tasks:{} };
  addCycleTo(proj, 'pileCapCycle', 'Grid line R Pile caps 8-10', s, null);
  return proj;
}
function addCycleTo(proj, tplId, sectionName, firstStart, chainToTaskId){
  const tpl = (state.templates[tplId]||DEFAULT_TEMPLATES[tplId]);
  if(!tpl) return;
  const sid=uid('s_');
  const order = Object.keys(proj.sections).length;
  proj.sections[sid] = { name:sectionName, order };
  let prevId = chainToTaskId || null;
  tpl.tasks.forEach((step,i)=>{
    const tid=uid('t_');
    const t = { sectionId:sid, order:i, name:step.name, companyId:step.companyId, days:step.days, lag:0, depId:null, linkedPourId:null };
    if(i===0){
      if(chainToTaskId){ t.depMode='afterPrev'; t.depId=chainToTaskId; }
      else { t.depMode='manual'; t.start=firstStart; }
    } else { t.depMode='afterPrev'; }
    proj.tasks[tid]=t; prevId=tid;
  });
  return sid;
}

/* ============================================================ ACTIVE PROJECT */
function activeId(){ return state.meta.activeProjectId || Object.keys(state.projects)[0]; }
function activeProject(){ return state.projects[activeId()]; }
function ensureActive(){
  if(!Object.keys(state.projects).length){ const p=defaultProject(); state.projects[p.id]=p; state.meta.activeProjectId=p.id; }
  if(!state.projects[state.meta.activeProjectId]) state.meta.activeProjectId=Object.keys(state.projects)[0];
}
function companyList(){ return Object.entries(state.companies).map(([id,c])=>({id,...c})).sort((a,b)=>(a.order||0)-(b.order||0)); }
function sectionList(p){ return Object.entries(p.sections||{}).map(([id,s])=>({id,...s})).sort((a,b)=>(a.order||0)-(b.order||0)); }
function tasksOf(p, sid){ return Object.entries(p.tasks||{}).filter(([,t])=>t.sectionId===sid).map(([id,t])=>({id,...t})).sort((a,b)=>(a.order||0)-(b.order||0)); }

function recomputeActive(){
  const p=activeProject(); if(!p){ state.resolved={}; return; }
  const res=computeProject(p, state.holidays); state.resolved=res;
  Object.entries(res).forEach(([tid,r])=>{ if(p.tasks[tid]){ p.tasks[tid].cStart=r.start; p.tasks[tid].cFinish=r.finish; } });
}

/* ============================================================ FIREBASE */
const FIREBASE_CONFIG = { databaseURL: localStorage.getItem('la_firebase_url') || 'https://gen-lang-client-0119642855-default-rtdb.firebaseio.com' };
const DBURL = FIREBASE_CONFIG.databaseURL;
let db=null;
function initFirebase(){ try{ if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); return true; }catch(e){ console.error('fb init',e); return false; } }
const fb = {
  set:(p,d)=> db? db.ref(NS+'/'+p).set(d) : Promise.resolve(),
  update:(p,d)=> db? db.ref(NS+'/'+p).update(d) : Promise.resolve(),
  get:(p)=> db? db.ref(NS+'/'+p).once('value').then(s=>s.val()) : Promise.resolve(null),
  remove:(p)=> db? db.ref(NS+'/'+p).remove() : Promise.resolve(),
  listen:(p,cb)=>{ if(db) db.ref(NS+'/'+p).on('value', s=>cb(s.val())); },
};
function saveLocal(){ try{ localStorage.setItem('la_snapshot', JSON.stringify({companies:state.companies,holidays:state.holidays,templates:state.templates,meta:state.meta,projects:state.projects})); }catch(e){} }
function loadLocal(){
  try{ const s=JSON.parse(localStorage.getItem('la_snapshot')||'null');
    if(s){ state.companies=s.companies||{}; state.holidays=s.holidays||{}; state.templates=s.templates||{}; state.meta=s.meta||{}; state.projects=s.projects||{}; }
  }catch(e){}
  if(!Object.keys(state.companies).length) state.companies={...DEFAULT_COMPANIES};
  if(!Object.keys(state.templates).length) state.templates=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  if(!Object.keys(state.holidays).length) state.holidays={...DEFAULT_HOLIDAYS};
  try{ state.collapsed=JSON.parse(localStorage.getItem('la_collapsed')||'{}'); }catch(e){}
}
let saveTimer=null;
function saveActive(){
  saveLocal(); setSaveStatus('saving');
  if(!db){ setSaveStatus('saved'); return; }
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const pid=activeId(); const w=(pid&&state.projects[pid])? fb.set('projects/'+pid, state.projects[pid]) : Promise.resolve();
    Promise.resolve(w).then(()=>fb.set('meta', state.meta)).then(()=>setSaveStatus('saved')).catch(()=>setSaveStatus('saved'));
  }, 450);
}
/* ----- save status indicator ----- */
function setSaveStatus(s){ state.saveState={ status:s, at: s==='saved'?Date.now():(state.saveState&&state.saveState.at||0) }; const el=document.getElementById('saveStatus'); if(el) el.outerHTML=saveStatusEl(); }
function saveStatusEl(){
  const s=state.saveState||{status:'saved',at:0}; let icon,txt,cls;
  if(!state.online){ icon='cloud_off'; txt='Saved on device'; cls='text-amber-300'; }
  else if(s.status==='saving'){ icon='sync'; txt='Saving…'; cls='text-amber-300'; }
  else { const t=s.at? new Date(s.at).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):''; icon='cloud_done'; txt='Saved'+(t?' '+t:''); cls='text-sky-300'; }
  return `<span id="saveStatus" class="text-xs px-2 py-1 rounded-full ${cls} whitespace-nowrap" style="background:rgba(150,170,205,.1)"><span class="ms text-[14px]">${icon}</span> ${txt}</span>`;
}
/* ----- undo / redo (per-schedule snapshot stack) ----- */
let undoStack=[], redoStack=[];
function snapProject(){ const pid=activeId(); return { pid, data: JSON.stringify(state.projects[pid]||{}) }; }
function pushUndo(){ if(!activeId()) return; undoStack.push(snapProject()); if(undoStack.length>60) undoStack.shift(); redoStack=[]; }
function applySnap(s){ state.projects[s.pid]=JSON.parse(s.data); state.meta.activeProjectId=s.pid; recomputeActive(); render(); saveActive(); }
function undo(){ if(!undoStack.length) return toast('Nothing to undo','warn'); redoStack.push(snapProject()); applySnap(undoStack.pop()); toast('Undone'); }
function redo(){ if(!redoStack.length) return toast('Nothing to redo','warn'); undoStack.push(snapProject()); applySnap(redoStack.pop()); toast('Redone'); }
function saveCompanies(){ saveLocal(); fb.set('companies', state.companies); }
function saveHolidays(){ saveLocal(); fb.set('holidays', state.holidays); }
function saveTemplates(){ saveLocal(); fb.set('templates', state.templates); }

async function seedIfNeeded(){
  if(!await fb.get('companies')) await fb.set('companies', state.companies);
  if(!await fb.get('templates')) await fb.set('templates', state.templates);
  if(!await fb.get('holidays')) await fb.set('holidays', state.holidays);
  const projs=await fb.get('projects');
  if(!projs){ ensureActive(); await fb.set('projects/'+activeId(), activeProject()); await fb.set('meta', state.meta); }
}
function attachListeners(){
  fb.listen('companies', v=>{ if(v){ state.companies=v; saveLocal(); render(); } });
  fb.listen('holidays',  v=>{ state.holidays=v||{}; saveLocal(); recomputeActive(); render(); });
  fb.listen('templates', v=>{ if(v){ state.templates=v; saveLocal(); } });
  fb.listen('meta',      v=>{ if(v){ state.meta=v; ensureActive(); recomputeActive(); render(); } });
  fb.listen('projects',  v=>{ state.projects=v||{}; ensureActive(); recomputeActive(); saveLocal(); render(); });
  if(db) db.ref('pours-user').on('value', s=>{ state.pours=s.val()||{}; if(state.nav==='schedule') render(); });
}

/* ============================================================ MUTATIONS */
function changeTaskField(tid, field, value){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  if(field==='days') value=Math.max(1, parseInt(value)||1);
  if(field==='lag') value=parseInt(value)||0;
  t[field]=value;
  recomputeActive(); render(); saveActive();
}
function toggleDep(tid){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  if(t.depMode==='afterPrev'){ t.depMode='manual'; t.start = state.resolved[tid]?.start || p.startDate; }
  else { t.depMode='afterPrev'; }
  recomputeActive(); render(); saveActive();
}
function addTask(sid){
  pushUndo();
  const p=activeProject(); const n=tasksOf(p,sid).length;
  const tid=uid('t_'); p.tasks[tid]={ sectionId:sid, order:n, name:'New task', companyId:companyList()[0]?.id||'webcor', days:1, depMode: n? 'afterPrev':'manual', depId:null, lag:0, linkedPourId:null, start:p.startDate };
  recomputeActive(); render(); saveActive();
}
function dupTask(tid){
  const p=activeProject(); const t=p.tasks[tid]; if(!t) return;
  pushUndo();
  const copy=JSON.parse(JSON.stringify(t)); copy.order=(t.order||0)+0.5; const nid=uid('t_'); p.tasks[nid]=copy;
  renumber(p,t.sectionId); recomputeActive(); render(); saveActive();
}
function delTask(tid){ const p=activeProject(); if(!p.tasks[tid]) return; pushUndo(); const sid=p.tasks[tid].sectionId; delete p.tasks[tid]; if(sid) renumber(p,sid); recomputeActive(); render(); saveActive(); }
function moveTask(tid, dir){
  const p=activeProject(); const t=p.tasks[tid]; const arr=tasksOf(p,t.sectionId);
  const i=arr.findIndex(x=>x.id===tid); const j=i+dir; if(j<0||j>=arr.length) return;
  pushUndo();
  const a=arr[i], b=arr[j]; const ao=p.tasks[a.id].order; p.tasks[a.id].order=p.tasks[b.id].order; p.tasks[b.id].order=ao;
  recomputeActive(); render(); saveActive();
}
function renumber(p, sid){ tasksOf(p,sid).forEach((t,i)=>{ p.tasks[t.id].order=i; }); }
function addSection(){ pushUndo(); const p=activeProject(); const sid=uid('s_'); p.sections[sid]={name:'New Section', order:sectionList(p).length}; render(); saveActive(); }
function renameSection(sid,name){ pushUndo(); activeProject().sections[sid].name=name; saveActive(); }
function delSection(sid){ const p=activeProject(); if(!confirm('Delete this section and its tasks?')) return; pushUndo(); Object.keys(p.tasks).forEach(tid=>{ if(p.tasks[tid].sectionId===sid) delete p.tasks[tid]; }); delete p.sections[sid]; recomputeActive(); render(); saveActive(); }
function moveSection(sid,dir){ const p=activeProject(); const arr=sectionList(p); const i=arr.findIndex(x=>x.id===sid); const j=i+dir; if(j<0||j>=arr.length) return; pushUndo(); const a=arr[i],b=arr[j]; const ao=p.sections[a.id].order; p.sections[a.id].order=p.sections[b.id].order; p.sections[b.id].order=ao; render(); saveActive(); }
function duplicateSection(sid){
  const p=activeProject(); const src=p.sections[sid]; if(!src) return;
  pushUndo();
  const nsid=uid('s_'); p.sections[nsid]={ name: src.name+' (copy)', order: sectionList(p).length };
  const idmap={};
  tasksOf(p,sid).forEach(t=>{ const nid=uid('t_'); idmap[t.id]=nid; const c=JSON.parse(JSON.stringify(t)); c.sectionId=nsid; delete c.id; p.tasks[nid]=c; });
  Object.values(idmap).forEach(nid=>{ const t=p.tasks[nid]; if(t.depId && idmap[t.depId]) t.depId=idmap[t.depId]; });
  recomputeActive(); render(); saveActive(); toast('Section duplicated');
}

}

function toggleCollapse(sid){ state.collapsed[sid]=!state.collapsed[sid]; saveCollapsed(); render(); }

/* ---------- GANTT (WYSIWYG preview) ---------- */
function ganttWindow(p){
  const res=state.resolved; let min=null,max=null;
  Object.values(res).forEach(r=>{ if(!min||r.start<min)min=r.start; if(!max||r.finish>max)max=r.finish; });
  if(!min){ min=max=p.startDate; }
  let start=min; while(dow(start)!==1) start=addDays(start,-1);
  let end=max; while(dow(end)!==0) end=addDays(end,1);
  const days=[]; let s=start; let g=0; while(parseYMD(s)<=parseYMD(end) && g++<800){ days.push(s); s=addDays(s,1); }
  return days;
}
function ganttPanel(p){
  const days=ganttWindow(p);
  const today=fmtYMD(new Date());
  const cellW=Math.max(12, Math.round(24*state.gz));
  const filt=state.gFilter, byStatus=state.gColor==='status';
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DW=['S','M','T','W','T','F','S'];
  let monthRow=''; let i=0;
  while(i<days.length){ const m=days[i].slice(0,7); let span=0; while(i+span<days.length && days[i+span].slice(0,7)===m) span++; const d=parseYMD(days[i]); monthRow+=`<th class="lab text-left" colspan="${span}" style="background:#0f1722">${MON[d.getMonth()]} ${d.getFullYear()}</th>`; i+=span; }
  const dayHead=days.map(d=>{ const cl=isHoliday(d,state.holidays)?'hol':isWeekend(d)?'wknd':''; return `<th class="day ${cl}" ${d===today?'id="todayCol"':''}><div class="text-white/40 text-[9px]">${DW[dow(d)]}</div>${Number(d.slice(8))}</th>`; }).join('');
  const legend = byStatus
    ? STATUS.map(s=>`<span class="chip" style="background:${s.color};color:${textOn(s.color)}">&nbsp;</span><span class="text-xs text-white/60 mr-3">${s.label}</span>`).join('')
    : companyList().map(c=>`<span class="chip" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span><span class="text-xs text-white/60 mr-3">${esc(c.name)}</span>`).join('');

  let body='';
  sectionList(p).forEach(s=>{
    const tks=tasksOf(p,s.id).filter(t=> filt==='all' || t.companyId===filt);
    if(!tks.length) return;
    body+=`<tr class="secband"><td colspan="${days.length+5}">${esc(s.name)}</td></tr>`;
    tks.forEach(t=>{
      const r=state.resolved[t.id]||{}; const c=state.companies[t.companyId]||{color:'#444',letter:'?'};
      const fill = byStatus ? statusMeta(taskStatus(t)).color : c.color;
      const cells=days.map(d=>{
        const within = r.start && d>=r.start && d<=r.finish;
        if(within && isWorkday(d,state.holidays)){ const td=d===today?'today':''; return `<td class="day ${td}" style="background:${fill};color:${textOn(fill)}">${esc(c.letter)}</td>`; }
        const cl=isHoliday(d,state.holidays)?'hol':isWeekend(d)?'wknd':''; const td=d===today?'today':''; return `<td class="day ${cl} ${td}"></td>`;
      }).join('');
      body+=`<tr>
        <td class="lab tname">${esc(t.name)}</td>
        <td class="lab mono text-white/60">${esc(fmtMD(r.start))}</td>
        <td class="lab mono text-white/60">${esc(fmtMD(r.finish))}</td>
        <td class="lab text-center text-white/60">${t.days}</td>
        <td class="lab"><span class="chip" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span></td>
        ${cells}</tr>`;
    });
  });
  const coOpts=`<option value="all">All crews</option>`+companyList().map(c=>`<option value="${c.id}" ${c.id===filt?'selected':''}>${esc(c.name)}</option>`).join('');
  return `<div class="card gantt-card p-3" id="ganttCard">
    <div class="flex items-center gap-2 mb-2 flex-wrap">
      <span class="lcaps" style="font-size:10px">Gantt</span>
      <div class="flex items-center gap-0.5">
        <button class="icobtn" title="Zoom out" onclick="state.gz=Math.max(0.6,+(state.gz-0.2).toFixed(2)); render()"><span class="ms text-[18px]">zoom_out</span></button>
        <button class="icobtn" title="Zoom in" onclick="state.gz=Math.min(2,+(state.gz+0.2).toFixed(2)); render()"><span class="ms text-[18px]">zoom_in</span></button>
      </div>
      <select class="fld" title="Filter by crew" onchange="state.gFilter=this.value; render()">${coOpts}</select>
      <select class="fld" title="Color bars by" onchange="state.gColor=this.value; render()">
        <option value="company" ${!byStatus?'selected':''}>Color by crew</option>
        <option value="status" ${byStatus?'selected':''}>Color by status</option></select>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('todayCol')?.scrollIntoView({inline:'center',block:'nearest'})"><span class="ms text-[16px]">today</span>Today</button>
      <button class="icobtn ml-auto" title="Fullscreen" onclick="toggleGanttFull()"><span class="ms text-[18px]">fullscreen</span></button>
    </div>
    <div class="flex items-center flex-wrap gap-y-1 mb-2">${legend}</div>
    <div class="scroll" style="max-height:62vh">
      <table class="gantt" style="--dayw:${cellW}px">
        <thead>
          <tr><th class="lab tname" style="background:#0f1722" rowspan="2">Task</th><th class="lab" style="background:#0f1722" rowspan="2">Start</th><th class="lab" style="background:#0f1722" rowspan="2">Finish</th><th class="lab" style="background:#0f1722" rowspan="2">Days</th><th class="lab" style="background:#0f1722" rowspan="2">Co.</th>${monthRow}</tr>
          <tr>${dayHead}</tr>
        </thead>
        <tbody>${body}</tbody>
      </table>
    </div>
  </div>`;
}
function toggleGanttFull(){ const el=document.getElementById('ganttCard'); if(!el) return; if(document.fullscreenElement) document.exitFullscreen(); else el.requestFullscreen&&el.requestFullscreen(); }

/* ============================================================ STATUS */
const STATUS=[
  {id:'todo',  label:'Not started', color:'#6b7686', icon:'radio_button_unchecked'},
  {id:'doing', label:'In progress', color:'#2f80ed', icon:'pending'},
  {id:'done',  label:'Done',        color:'#41A447', icon:'check_circle'},
];
function taskStatus(t){ return t.status||'todo'; }
function statusMeta(id){ return STATUS.find(s=>s.id===id)||STATUS[0]; }
function setTaskStatus(tid,st){ const p=activeProject(); const t=p.tasks[tid]; if(!t)return; pushUndo(); t.status=st; render(); afterRender(); saveActive(); }
function cycleStatus(tid){ const order=['todo','doing','done']; const cur=taskStatus(activeProject().tasks[tid]); setTaskStatus(tid, order[(order.indexOf(cur)+1)%3]); }

/* ============================================================ LOOK-AHEAD (3-week) */
function weekMonday(ymd){ let s=ymd; while(dow(s)!==1) s=addDays(s,-1); return s; }
function tasksOnDay(p,d){
  const out=[];
  Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(r && r.start<=d && d<=r.finish && isWorkday(d,state.holidays)) out.push({tid,...t}); });
  return out.sort((a,b)=>(a.sectionId+a.order).localeCompare(b.sectionId+b.order));
}
function lookAheadView(p){
  const today=fmtYMD(new Date());
  let wkStart=weekMonday(today); for(let i=0;i<state.laOffset;i++) wkStart=addDays(wkStart,7);
  const DW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let weeks='';
  for(let w=0; w<state.laWeeks; w++){
    const ws=addDays(wkStart, w*7);
    const days=[]; for(let i=0;i<7;i++) days.push(addDays(ws,i));
    const cols=days.map((d,i)=>{
      const hol=isHoliday(d,state.holidays);
      const chips=tasksOnDay(p,d).map(t=>{
        const c=state.companies[t.companyId]||{color:'#888',letter:'?'}; const done=taskStatus(t)==='done'; const st=statusMeta(taskStatus(t));
        return `<div class="la-chip" style="border-left:3px solid ${c.color};${done?'opacity:.55':''}" onclick="cycleStatus('${t.tid}')" title="${esc(t.name)} · ${esc(c.name)} · ${st.label} (click to advance)">

  return `

}

/* ============================================================ CREW VIEW */
function crewWorkload(p){ const m={}; Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(!r)return; m[t.companyId]=(m[t.companyId]||0)+workingDaysBetween(r.start,r.finish,state.holidays).length; }); return m; }
const NON_CREW=new Set(['cure','inspect','pour','survey']); // passive / events: not crew-conflicts
function crewConflicts(p){
  const days=ganttWindow(p); const out=[];
  days.forEach(d=>{ if(!isWorkday(d,state.holidays))return;
    const byCo={};
    Object.entries(p.tasks).forEach(([tid,t])=>{ const r=state.resolved[tid]; if(r&&r.start<=d&&d<=r.finish&&!NON_CREW.has(t.companyId)) (byCo[t.companyId]=byCo[t.companyId]||[]).push({tid,...t}); });
    Object.entries(byCo).forEach(([cid,arr])=>{ const secs=new Set(arr.map(x=>x.sectionId)); if(secs.size>1) out.push({company:cid,day:d,tasks:arr,secs:[...secs]}); });
  });
  return out;
}
function crewView(p){
  const wl=crewWorkload(p);
  const conflicts=crewConflicts(p);
  // conflict summary: per company, count of conflicted days
  const byCo={}; conflicts.forEach(c=>{ byCo[c.company]=byCo[c.company]||new Set(); byCo[c.company].add(c.day); });
  const confCards=Object.keys(byCo).length ? Object.entries(byCo).map(([cid,daySet])=>{
    const c=state.companies[cid]||{name:cid,color:'#888',letter:'?'};
    return `<div class="flex items-center gap-2 px-3 py-2 rounded" style="background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.25)">
      <span class="codot" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
      <span class="font-semibold">${esc(c.name)}</span>
      <span class="text-white/60 text-sm">double-booked across grid lines on <b style="color:var(--error)">${daySet.size}</b> day${daySet.size>1?'s':''}</span>
      <span class="mono text-xs text-white/40 ml-auto">${[...daySet].slice(0,6).map(fmtMD).join(', ')}${daySet.size>6?'…':''}</span></div>`;
  }).join('') : `<div class="px-3 py-2 rounded text-sm" style="background:rgba(65,164,71,.1);border:1px solid rgba(65,164,71,.25);color:#86e08f">✓ No crew double-booked across grid lines.</div>`;
  // per-crew task groups
  const groups=companyList().filter(c=>wl[c.id]).sort((a,b)=>wl[b.id]-wl[a.id]).map(c=>{
    const tks=Object.entries(p.tasks).filter(([,t])=>t.companyId===c.id).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r).sort((a,b)=>a.r.start.localeCompare(b.r.start));
    const rows=tks.map(t=>{ const sec=p.sections[t.sectionId]?.name||''; const st=statusMeta(taskStatus(t));
      return `<div class="flex items-center gap-2 px-2 py-1 text-sm border-b border-white/5">
        <span class="ms text-[15px]" style="color:${st.color}">${st.icon}</span>
        <span class="flex-1 truncate">${esc(t.name)} <span class="text-white/35 text-xs">· ${esc(sec)}</span></span>
        <span class="mono text-xs text-white/55">${fmtMD(t.r.start)}–${fmtMD(t.r.finish)}</span></div>`;}).join('');
    return `<div class="card overflow-hidden">
      <div class="flex items-center gap-2 px-3 py-2" style="background:rgba(255,255,255,.03)">
        <span class="codot" style="background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
        <span class="display font-semibold flex-1">${esc(c.name)}</span>
        <span class="lcaps">${wl[c.id]} working days</span></div>
      ${rows}</div>`;
  }).join('');
  return `
    <div class="card p-3 mb-3"><div class="lcaps mb-2">Workload — working days per crew</div><div style="height:230px"><canvas id="crewChart"></canvas></div></div>
    <div class="card p-3 mb-3"><div class="lcaps mb-2">Crew conflicts</div><div class="space-y-1.5">${confCards}</div></div>
    <div class="grid md:grid-cols-2 gap-3">${groups}</div>`;
}
function drawCrewChart(){
  const p=activeProject(); const wl=crewWorkload(p);
  const cos=companyList().filter(c=>wl[c.id]).sort((a,b)=>wl[b.id]-wl[a.id]);
  drawChart('crewChart',{ type:'bar',
    data:{ labels:cos.map(c=>c.name), datasets:[{ data:cos.map(c=>wl[c.id]), backgroundColor:cos.map(c=>c.color), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#97a6bb',font:{size:11}},grid:{display:false}}, y:{beginAtZero:true,ticks:{color:'#97a6bb'},grid:{color:'rgba(255,255,255,.06)'}} } } });
}

/* ============================================================ PROGRESS VIEW */
function progressView(p){
  const tasks=Object.entries(p.tasks).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r);
  const cnt={todo:0,doing:0,done:0}; let totWd=0, doneWd=0;
  tasks.forEach(t=>{ cnt[taskStatus(t)]++; const wd=workingDaysBetween(t.r.start,t.r.finish,state.holidays).length; totWd+=wd; if(taskStatus(t)==='done') doneWd+=wd; });
  const pct=totWd?Math.round(doneWd/totWd*100):0;
  const list=tasks.sort((a,b)=>a.r.start.localeCompare(b.r.start)).map(t=>{
    const c=state.companies[t.companyId]||{color:'#888',letter:'?'};
    const btns=STATUS.map(s=>`<button class="icobtn" title="${s.label}" onclick="setTaskStatus('${t.tid}','${s.id}')" style="${taskStatus(t)===s.id?'color:'+s.color+';background:rgba(255,255,255,.06)':''}"><span class="ms text-[18px]">${s.icon}</span></button>`).join('');
    return `<div class="flex items-center gap-2 px-2 py-1.5 border-b border-white/5">
      <span class="codot" style="width:18px;height:18px;font-size:9px;background:${c.color};color:${textOn(c.color)}">${esc(c.letter)}</span>
      <span class="flex-1 truncate text-sm">${esc(t.name)} <span class="text-white/30 text-xs">· ${esc(p.sections[t.sectionId]?.name||'')}</span></span>
      <span class="mono text-xs text-white/45">${fmtMD(t.r.start)}–${fmtMD(t.r.finish)}</span>
      <div class="flex gap-0.5">${btns}</div></div>`;
  }).join('');
  return `
    <div class="flex gap-2 mb-3 flex-wrap">
      ${statCard('Complete', pct+'%', 'task_alt', pct>=100?'#41A447':null)}
      ${statCard('Done', cnt.done, 'check_circle', '#41A447')}
      ${statCard('In progress', cnt.doing, 'pending', '#2f80ed')}
      ${statCard('Not started', cnt.todo, 'radio_button_unchecked')}
    </div>
    <div class="grid md:grid-cols-2 gap-3 mb-3">
      <div class="card p-3"><div class="lcaps mb-2">Status</div><div style="height:230px"><canvas id="statusDonut"></canvas></div></div>
      <div class="card p-3"><div class="lcaps mb-2">Progress — planned vs done (cumulative working days)</div><div style="height:230px"><canvas id="sCurve"></canvas></div></div>
    </div>
    <div class="card overflow-hidden"><div class="lcaps px-3 py-2" style="background:rgba(255,255,255,.03)">Set task status</div><div class="scroll" style="max-height:46vh">${list}</div></div>`;
}
function drawProgressCharts(){
  const p=activeProject();
  const cnt={todo:0,doing:0,done:0}; Object.values(p.tasks).forEach(t=>cnt[taskStatus(t)]++);
  drawChart('statusDonut',{ type:'doughnut',
    data:{ labels:['Not started','In progress','Done'], datasets:[{ data:[cnt.todo,cnt.doing,cnt.done], backgroundColor:['#6b7686','#2f80ed','#41A447'], borderWidth:0 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{legend:{position:'bottom',labels:{color:'#dbe4ef',boxWidth:12}}} } });
  const days=ganttWindow(p); const labels=[],planned=[],actual=[];
  const tasks=Object.entries(p.tasks).map(([tid,t])=>({tid,...t,r:state.resolved[tid]})).filter(x=>x.r);
  days.forEach((d,i)=>{ if(i%3!==0 && i!==days.length-1) return; let pl=0,ac=0;
    tasks.forEach(t=>{ const wd=workingDaysBetween(t.r.start,t.r.finish,state.holidays).length; if(t.r.finish<=d){ pl+=wd; if(taskStatus(t)==='done') ac+=wd; } });
    labels.push(fmtMD(d)); planned.push(pl); actual.push(ac); });
  drawChart('sCurve',{ type:'line',
    data:{ labels, datasets:[
      {label:'Planned',data:planned,borderColor:'#2f80ed',backgroundColor:'rgba(47,128,237,.15)',fill:true,tension:.3,pointRadius:0},
      {label:'Actual (done)',data:actual,borderColor:'#41A447',backgroundColor:'rgba(65,164,71,.12)',fill:true,tension:.3,pointRadius:0} ] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#dbe4ef',boxWidth:12}}},
      scales:{ x:{ticks:{color:'#97a6bb',maxTicksLimit:9,font:{size:10}},grid:{display:false}}, y:{beginAtZero:true,ticks:{color:'#97a6bb'},grid:{color:'rgba(255,255,255,.06)'}} } } });
}

function isTouch(){ return (navigator.maxTouchPoints||0)>0 || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); }
async function sharePdf(blob, filename){
  const file=new File([blob],filename,{type:'application/pdf'});
  if(isTouch() && navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],title:filename}); return; }catch(e){ if(e.name==='AbortError') return; } }
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },200);
}

/* build the row model shared by PDF + XLSX */
function scheduleRows(p){
  const rows=[]; // {type:'section'|'task', ...}
  sectionList(p).forEach(s=>{
    rows.push({type:'section', name:s.name});
    tasksOf(p,s.id).forEach(t=>{ const r=state.resolved[t.id]||{}; const c=state.companies[t.companyId]||{}; rows.push({type:'task', name:t.name, start:r.start, finish:r.finish, days:t.days, color:c.color, colorName:c.color, letter:c.letter, companyName:c.name}); });
  });
  return rows;
}

async function exportPDF(mode){
  closeModal(); const p=activeProject(); recomputeActive();
  try{ await ensureLibs(); }catch(e){ return toast('Could not load PDF library','err'); }
  const { jsPDF } = window.jspdf;
  const days=ganttWindow(p); const rows=scheduleRows(p);
  const today=fmtYMD(new Date());
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DW=['S','M','T','W','T','F','S'];
  const LABELW=[150,52,52,30,40,70]; // Task,Start,Finish,Days,Color,Company
  const labelTotal=LABELW.reduce((a,b)=>a+b,0);
  const DAYW=14, ROWH=15, HEADERTOP=96, MARGIN=22;

  // chunk days for tiled mode; one big chunk for wide
  let chunks;
  if(mode==='wide'){ chunks=[days]; }
  else { const perPage=Math.floor((792 - 2*MARGIN - labelTotal)/DAYW); chunks=[]; for(let i=0;i<days.length;i+=perPage) chunks.push(days.slice(i,i+perPage)); }

  function drawHeaderBlock(doc, pageW){
    // Webcor wordmark
    doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(63,165,53);
    doc.text('WEBCOR', MARGIN, 34);
    doc.setTextColor(120,170,110); doc.setFontSize(13); doc.text('CONCRETE', MARGIN+98, 34);
    // title
    doc.setTextColor(20,28,40); doc.setFont('helvetica','bold'); doc.setFontSize(15);
    doc.text(p.name+' — '+(p.subtitle||'Look Ahead Schedule'), pageW/2, 26, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,100,115);
    doc.text('Exported '+today, pageW-MARGIN, 26, {align:'right'});
    doc.setDrawColor(63,165,53); doc.setLineWidth(1.2); doc.line(MARGIN, 40, pageW-MARGIN, 40);
    // legend
    let lx=MARGIN, ly=54; doc.setFontSize(8);
    companyList().forEach(c=>{
      const w=22 + doc.getTextWidth(c.name) + 10;
      if(lx+w > pageW-MARGIN){ lx=MARGIN; ly+=16; }
      const [r,g,b]=hexToRgb(c.color); doc.setFillColor(r,g,b); doc.roundedRect(lx, ly-8, 16, 11, 2,2,'F');
      const to=textOn(c.color)==='#111111'?[17,17,17]:[255,255,255]; doc.setTextColor(...to); doc.setFont('helvetica','bold');
      doc.text(c.letter, lx+8, ly, {align:'center'});
      doc.setTextColor(40,48,60); doc.setFont('helvetica','normal'); doc.text(c.name, lx+20, ly);
      lx += w;
    });
  }

  let doc;
  chunks.forEach((chunk, ci)=>{
    const pageW = mode==='wide' ? (labelTotal + chunk.length*DAYW + 2*MARGIN) : 792;
    const bodyRows = rows.length;
    const pageH = mode==='wide' ? Math.max(612, HEADERTOP + (bodyRows+2)*ROWH + MARGIN) : 612;
    if(ci===0){ doc=new jsPDF({orientation:'landscape', unit:'pt', format:[pageW,pageH]}); }
    else { doc.addPage([pageW,pageH],'landscape'); }

    const head1 = [{content:'Task',styles:{halign:'left'}},'Start','Finish','Days','Color','Company'];
    // month spans + day numbers as two header rows
    const monthCells=[]; let i=0; while(i<chunk.length){ const m=chunk[i].slice(0,7); let span=0; while(i+span<chunk.length && chunk[i+span].slice(0,7)===m) span++; const d=parseYMD(chunk[i]); monthCells.push({content:MON[d.getMonth()], colSpan:span, styles:{halign:'left',fillColor:[235,238,242]}}); i+=span; }
    const dayCells=chunk.map(d=>({content:String(Number(d.slice(8))), styles:{fillColor: isHoliday(d,state.holidays)?[250,225,225]:isWeekend(d)?[225,230,238]:[245,247,250]}}));
    const head=[ head1.concat(monthCells), ['','','','','',''].concat(dayCells) ];
    // span the 6 label headers across both header rows by using rowSpan on first row & blanks on second
    head[0]=[{content:'Task',rowSpan:2,styles:{halign:'left',valign:'middle'}},{content:'Start',rowSpan:2,styles:{valign:'middle'}},{content:'Finish',rowSpan:2,styles:{valign:'middle'}},{content:'Days',rowSpan:2,styles:{valign:'middle'}},{content:'Color',rowSpan:2,styles:{valign:'middle'}},{content:'Company',rowSpan:2,styles:{valign:'middle'}}].concat(monthCells);
    head[1]=dayCells;

    // body
    const fills={}; // 'rowIdx:colIdx' -> {color, letter}
    const body=rows.map((row, ri)=>{
      if(row.type==='section'){ return [{content:row.name, colSpan:6+chunk.length, styles:{fillColor:[31,78,121], textColor:[255,255,255], fontStyle:'bold', halign:'left'}}]; }
      const dcells=chunk.map((d,j)=>{
        const within = row.start && d>=row.start && d<=row.finish && isWorkday(d,state.holidays);
        if(within){ fills[ri+':'+(6+j)]={color:row.color||'#888', letter:row.letter||''}; return ''; }
        return '';
      });
      return [row.name, fmtMD(row.start), fmtMD(row.finish), String(row.days), row.colorName||'', row.companyName||''].concat(dcells);
    });

    const colStyles={0:{cellWidth:LABELW[0],halign:'left'},1:{cellWidth:LABELW[1],halign:'center'},2:{cellWidth:LABELW[2],halign:'center'},3:{cellWidth:LABELW[3],halign:'center'},4:{cellWidth:LABELW[4],halign:'center'},5:{cellWidth:LABELW[5],halign:'center'}};
    chunk.forEach((d,j)=>{ colStyles[6+j]={cellWidth: mode==='wide'?DAYW:undefined, halign:'center', fillColor: isHoliday(d,state.holidays)?[250,228,228]:isWeekend(d)?[232,236,242]:[255,255,255]}; });

    doc.autoTable({
      head, body, startY: HEADERTOP,
      theme:'grid', styles:{fontSize:7, cellPadding:1.5, lineColor:[210,215,222], lineWidth:0.3, textColor:[40,48,60], overflow:'hidden'},
      headStyles:{fontSize:6.5, fillColor:[245,247,250], textColor:[40,48,60], lineWidth:0.3},
      columnStyles: colStyles,
      margin:{top:HEADERTOP, left:MARGIN, right:MARGIN, bottom:MARGIN},
      tableWidth: mode==='wide' ? 'wrap' : 'auto',
      didDrawPage:()=> drawHeaderBlock(doc, doc.internal.pageSize.getWidth()),
      didDrawCell:(data)=>{
        if(data.section!=='body') return;
        const f=fills[data.row.index+':'+data.column.index];
        if(f){ const [r,g,b]=hexToRgb(f.color); doc.setFillColor(r,g,b); doc.rect(data.cell.x, data.cell.y, data.cell.width, data.cell.height, 'F');
          const to=textOn(f.color)==='#111111'?[17,17,17]:[255,255,255]; doc.setTextColor(...to); doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
          doc.text(f.letter, data.cell.x+data.cell.width/2, data.cell.y+data.cell.height/2+2, {align:'center'}); }
      },
    });
  });
  const blob=doc.output('blob');
  const stamp=today.split('-'); await sharePdf(blob, `LACC_Look_Ahead_${stamp[1]}.${stamp[2]}.${stamp[0]}.pdf`);
  toast('PDF ready','ok');
}

async function exportXLSX(){
  closeModal(); const p=activeProject(); recomputeActive();
  try{ await ensureLibs(); }catch(e){ return toast('Could not load Excel library','err'); }
  const XLSX=window.XLSX; const rows=scheduleRows(p);
  const head=['Task','Start','Duration (wd)','Finish','Company','Letter','Color'];
  const aoa=[head];
  rows.forEach(r=>{ if(r.type==='section') aoa.push([r.name]); else aoa.push([r.name, r.start, r.days, r.finish, r.companyName, r.letter, r.colorName]); });
  const wsS=XLSX.utils.aoa_to_sheet(aoa); wsS['!cols']=[{wch:34},{wch:12},{wch:12},{wch:12},{wch:14},{wch:8},{wch:12}];
  const wsC=XLSX.utils.aoa_to_sheet([['Company','Letter','Color'],...companyList().map(c=>[c.name,c.letter,c.color])]); wsC['!cols']=[{wch:16},{wch:8},{wch:12}];
  const wsH=XLSX.utils.aoa_to_sheet([['Date','Label'],...Object.entries(state.holidays).sort().map(([d,l])=>[d,l])]); wsH['!cols']=[{wch:14},{wch:28}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsS, 'Schedule');
  XLSX.utils.book_append_sheet(wb, wsC, 'Companies');
  XLSX.utils.book_append_sheet(wb, wsH, 'Holidays');
  const today=fmtYMD(new Date()).split('-');
  XLSX.writeFile(wb, `LACC_Look_Ahead_${today[1]}.${today[2]}.${today[0]}.xlsx`);
  toast('Excel ready','ok');
}

/* ============================================================ ATTENDANCE (reads foreman-attendance/) */
function ensureAttendance(){
  if(state.att.loaded || state.att.loading) return;
  if(!db){ render(); return; }
  state.att.loading=true;
  db.ref('foreman-attendance/foremen').on('value', s=>{ state.att.foremen=s.val()||{}; if(state.nav==='attendance') render(); });
  db.ref('foreman-attendance/members').on('value', s=>{ state.att.members=s.val()||{}; if(state.nav==='attendance') render(); });
  db.ref('foreman-attendance/areas').on('value',   s=>{ state.att.areas=s.val()||{};   if(state.nav==='attendance') render(); });
  fetch(DBURL+'/foreman-attendance/attendance.json?shallow=true').then(r=>r.json()).then(d=>{
    state.att.dates=Object.keys(d||{}).sort().reverse(); state.att.date=state.att.dates[0]||''; state.att.loaded=true; state.att.loading=false;
    if(state.att.date) loadAttDay(state.att.date); else render();
  }).catch(()=>{ state.att.loaded=true; state.att.loading=false; render(); });
}
function loadAttDay(date){
  state.att.date=date; render();
  fetch(DBURL+'/foreman-attendance/attendance/'+date+'.json').then(r=>r.json()).then(d=>{ state.att.records=d||{}; render(); }).catch(()=>{ state.att.records={}; render(); });
}
function attPerson(pid){
  const f=state.att.foremen[pid]; if(f) return {name:f.name, role:'Foreman', cls:f.classification||'', areaId:f.area, crew:f.name};
  const m=state.att.members[pid]; if(m){ const fm=state.att.foremen[m.foremanId]||{}; return {name:m.name, role:'Crew', cls:m.classification||'', areaId:fm.area, crew:fm.name||''}; }
  return {name:pid, role:'', cls:'', areaId:'', crew:''};
}
function attendanceView(){
  if(!state.online) return shellMsg('cloud_off','Offline','Connect to view foreman sign-in data.');
  if(!state.att.loaded) return shellMsg('how_to_reg','Loading attendance…','Pulling sign-ins the foremen submitted.');
  const dateOpts=state.att.dates.map(d=>`<option value="${d}" ${d===state.att.date?'selected':''}>${d}</option>`).join('') || '<option>No data</option>';
  const recs=Object.entries(state.att.records||{});
  let totHours=0, injured=0;
  const rows=recs.map(([pid,r])=>{
    const p=attPerson(pid); const area=state.att.areas[p.areaId]?.name||'—';
    totHours+=Number(r.totalHours)||0; if(r.injured) injured++;
    const sig=r.signatureType==='drawn'&&r.signatureDataUrl ? `<img src="${r.signatureDataUrl}" style="height:26px;max-width:90px;background:#fff;border-radius:3px;padding:1px">` : (r.signatureType==='typed'? `<span class="italic text-white/70">${esc(r.signatureText||'signed')}</span>` : '<span class="text-white/30">—</span>');
    return `<tr class="border-b border-white/5">
      <td class="px-2 py-1.5">${esc(p.name)}</td>
      <td class="px-2 py-1.5"><span class="chip" style="background:${p.role==='Foreman'?'#3FA53522':'#4A8EFF22'};color:${p.role==='Foreman'?'#7ee06f':'#9ec5ff'}">${p.role||'—'}</span> <span class="text-white/45 text-xs">${esc(p.cls)}</span></td>
      <td class="px-2 py-1.5 text-white/70">${esc(p.crew||'—')}</td>
      <td class="px-2 py-1.5 text-white/70">${esc(area)}</td>
      <td class="px-2 py-1.5 mono">${esc(r.timeIn||'—')}</td>
      <td class="px-2 py-1.5 mono">${esc(r.timeOut||'—')}</td>
      <td class="px-2 py-1.5 mono text-center">${r.totalHours!=null?r.totalHours:'—'}</td>
      <td class="px-2 py-1.5 text-center text-xs text-white/50">${[r.lunch30?'L':null, r.break20?'B':null].filter(Boolean).join(' ')||'—'}</td>
      <td class="px-2 py-1.5 text-center">${r.injured?'<span class="chip" style="background:#E5393522;color:#ff9b97">⚠ Injured</span>':'<span class="text-white/25">ok</span>'}</td>
      <td class="px-2 py-1.5">${sig}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="10" class="px-3 py-6 text-center text-white/40">No sign-ins recorded for ${esc(state.att.date)}.</td></tr>`;
  return `<div class="max-w-[1500px] mx-auto px-4 py-4">
    <div class="flex items-center gap-3 mb-3 flex-wrap">
      <div class="flex items-center gap-2">
        <button class="icobtn" onclick="attStep(-1)" title="Previous day"><span class="ms">chevron_left</span></button>
        <select class="fld" onchange="loadAttDay(this.value)">${dateOpts}</select>
        <button class="icobtn" onclick="attStep(1)" title="Next day"><span class="ms">chevron_right</span></button>
      </div>
      <div class="flex gap-2 ml-auto">
        ${statCard('Signed in', recs.length, 'how_to_reg')}
        ${statCard('Total hours', totHours, 'schedule')}
        ${statCard('Injured', injured, 'health_and_safety', injured?'#E53935':null)}
      </div>
    </div>
    <div class="card overflow-hidden">
      <div class="scroll" style="max-height:70vh">
        <table class="dt">
          <thead>
            <tr><th class="px-2 py-2">Name</th><th class="px-2 py-2">Role</th><th class="px-2 py-2">Foreman</th><th class="px-2 py-2">Area</th><th class="px-2 py-2">In</th><th class="px-2 py-2">Out</th><th class="px-2 py-2 text-center">Hrs</th><th class="px-2 py-2 text-center">L/B</th><th class="px-2 py-2 text-center">Safety</th><th class="px-2 py-2">Signature</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="text-xs text-white/35 mt-2">Live sync from the Foreman Sign-In app · <a class="underline" href="https://dyap123.github.io/foreman-attendance/" target="_blank">open it</a></div>
  </div>`;
}
function attStep(dir){ const i=state.att.dates.indexOf(state.att.date); const j=i-dir; if(j<0||j>=state.att.dates.length) return; loadAttDay(state.att.dates[j]); }

/* ============================================================ TOOLS (reads tool-tracker/) */
function ensureTools(){
  if(state.tools.loaded){ render(); return; }
  if(!db){ render(); return; }
  db.ref('tool-tracker/assets').on('value', s=>{ state.tools.assets=s.val()||{}; state.tools.loaded=true; if(state.nav==='tools') render(); });
  db.ref('tool-tracker/config').on('value', s=>{ state.tools.config=s.val()||{}; if(state.nav==='tools') render(); });
}
function toolsList(){
  const q=(state.tools.q||'').toLowerCase(); const sf=state.tools.status;
  return Object.entries(state.tools.assets||{}).map(([k,a])=>({k,...a}))
    .filter(a=> sf==='all' || (a.status||'')===sf)
    .filter(a=> !q || (a.description||'').toLowerCase().includes(q) || (a.item_id||'').toLowerCase().includes(q) || (a.assigned_to||'').toLowerCase().includes(q) || (a.category||'').toLowerCase().includes(q))
    .sort((a,b)=>(a.description||'').localeCompare(b.description||''));
}
function toolsTableHTML(){
  const list=toolsList();
  const rows=list.map(a=>{
    const stColor={'On Site':'#41A447','Transferred':'#FFBF00','Returned':'#9AA3AD','Lost':'#E53935','Damaged':'#E0639B'}[a.status]||'#9AA3AD';
    const ver=a.verified==='Yes'?'<span class="chip" style="background:#41A44722;color:#86e08f">✓</span>':a.verified==='Missing'?'<span class="chip" style="background:#E5393522;color:#ff9b97">missing</span>':'<span class="text-white/25">—</span>';
    return `<tr class="border-b border-white/5">
      <td class="px-2 py-1.5 mono text-white/70">${esc(a.item_id||'')}</td>
      <td class="px-2 py-1.5">${esc(a.description||'')}</td>
      <td class="px-2 py-1.5 text-white/60">${esc(a.category||'—')}</td>
      <td class="px-2 py-1.5 text-center">${a.qty||1}</td>
      <td class="px-2 py-1.5"><span class="chip" style="background:${stColor}22;color:${stColor}">${esc(a.status||'—')}</span></td>
      <td class="px-2 py-1.5 text-white/70">${esc(a.assigned_to||'—')}</td>
      <td class="px-2 py-1.5 text-center">${ver}</td>
      <td class="px-2 py-1.5 text-right mono text-white/60">${a.unit_cost?'$'+a.unit_cost:''}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="8" class="px-3 py-6 text-center text-white/40">No tools match.</td></tr>`;
  return `<table class="dt">
    <thead>
      <tr><th class="px-2 py-2">Item ID</th><th class="px-2 py-2">Description</th><th class="px-2 py-2">Category</th><th class="px-2 py-2 text-center">Qty</th><th class="px-2 py-2">Status</th><th class="px-2 py-2">Assigned To</th><th class="px-2 py-2 text-center">Verified</th><th class="px-2 py-2 text-right">Monthly</th></tr>
    </thead><tbody>${rows}</tbody></table>
    <div class="px-2 py-2 text-xs text-white/40">${list.length} shown</div>`;
}
function toolsFilter(v){ state.tools.q=v; const el=document.getElementById('toolsList'); if(el) el.innerHTML=toolsTableHTML(); }
function toolsStatus(v){ state.tools.status=v; const el=document.getElementById('toolsList'); if(el) el.innerHTML=toolsTableHTML(); }
function toolsView(){
  if(!state.online) return shellMsg('cloud_off','Offline','Connect to view the tool inventory.');
  if(!state.tools.loaded) return shellMsg('handyman','Loading tools…','Pulling the live inventory from Tool Tracker.');
  const all=Object.values(state.tools.assets||{});
  const onSite=all.filter(a=>a.status==='On Site');
  const monthly=onSite.reduce((s,a)=>s+(Number(a.unit_cost)||0)*(Number(a.qty)||1),0);
  const lost=all.filter(a=>a.status==='Lost').length;
  const imp=state.tools.config?.lastImportFile||'—';
  const statuses=['all','On Site','Transferred','Returned','Lost','Damaged'];
  return `<div class="max-w-[1500px] mx-auto px-4 py-4">
    <div class="flex gap-2 mb-3 flex-wrap">
      ${statCard('On site', onSite.length, 'inventory_2')}
      ${statCard('Monthly charge', '$'+monthly.toLocaleString(), 'payments')}
      ${statCard('Lost', lost, 'report', lost?'#E53935':null)}
      ${statCard('Total items', all.length, 'category')}
      <div class="ml-auto self-center text-xs text-white/35">Last import: ${esc(imp)}</div>
    </div>
    <div class="flex gap-2 mb-3 flex-wrap items-center">
      <input class="fld w-64" placeholder="Search description, ID, assignee…" oninput="toolsFilter(this.value)" value="${esc(state.tools.q)}">
      <select class="fld" onchange="toolsStatus(this.value)">${statuses.map(s=>`<option value="${s}" ${s===state.tools.status?'selected':''}>${s==='all'?'All statuses':s}</option>`).join('')}</select>
    </div>
    <div class="card overflow-hidden"><div class="scroll" style="max-height:68vh" id="toolsList">${toolsTableHTML()}</div></div>
    <div class="text-xs text-white/35 mt-2">Live sync from Tool Tracker · <a class="underline" href="https://dyap123.github.io/tool-tracker/" target="_blank">open it</a></div>
  </div>`;
}

/* small shared UI bits */
function statCard(label, val, icon, accent){
  return `<div class="card px-3.5 py-2 flex items-center gap-2.5">
    <span class="ms text-[20px]" style="color:${accent||'var(--primary)'}">${icon}</span>
    <div><div class="lcaps" style="font-size:10px">${label}</div><div class="display font-bold text-lg" style="color:${accent||'var(--on)'}">${val}</div></div></div>`;
}
function shellMsg(icon,title,sub){ return `<div class="max-w-[1500px] mx-auto px-4 py-16 text-center text-white/50">
  <span class="ms text-[40px] text-white/30">${icon}</span><div class="display font-semibold text-lg mt-2">${title}</div><div class="text-sm mt-1">${sub}</div></div>`; }

/* ============================================================ BOOT */
function boot(){
  loadLocal(); ensureActive(); recomputeActive(); render();
  if(false){ state.online=true; attachListeners(); seedIfNeeded().catch(e=>console.warn(e)); }
  else { state.online=false; }
  render();
  document.addEventListener('keydown', e=>{
    const mod=e.metaKey||e.ctrlKey; if(!mod) return;
    const k=e.key.toLowerCase();
    if(k==='z' && state.nav==='schedule'){ e.preventDefault(); e.shiftKey?redo():undo(); }
    else if(k==='y' && state.nav==='schedule'){ e.preventDefault(); redo(); }
  });
}
document.addEventListener('DOMContentLoaded', boot);
